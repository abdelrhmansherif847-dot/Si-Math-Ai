<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Si Math AI — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050a14;
  --bg-elev-1:#0a1224;
  --bg-elev-2:#0e1830;
  --bg-card:#0c1428;
  --bg-card-hi:#101a32;

  --cyan:#38bdf8;
  --cyan-2:#0ea5e9;
  --cyan-3:#7dd3fc;
  --cyan-bg-soft:rgba(56,189,248,.1);
  --cyan-bg-med:rgba(56,189,248,.16);
  --cyan-border:rgba(56,189,248,.28);
  --cyan-border-soft:rgba(56,189,248,.14);

  --text-100:#ffffff;
  --text-200:#dde8f7;
  --text-300:#a8bcd9;
  --text-400:#7a90b2;
  --text-500:#536b8c;
  --border-soft:#1a2540;
  --border-mid:#26334d;

  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;
  --space-5:20px;--space-6:24px;--space-7:32px;--space-8:40px;

  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:24px;
  --font-display:'Manrope',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{
  background-color:#050a14 !important;
  background:#050a14 !important;
  color:var(--text-200);
  font-family:var(--font-body);
  font-size:15px;line-height:1.55;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100vh;
  min-height:100dvh;
  position:relative;
  display:flex;flex-direction:column;
}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb-1{width:380px;height:380px;background:radial-gradient(circle,rgba(56,189,248,.12),transparent 70%);top:-120px;right:-120px}
.orb-2{width:280px;height:280px;background:radial-gradient(circle,rgba(14,165,233,.08),transparent 70%);bottom:-60px;left:-100px}

a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* logo */
.logo-bar{
  position:relative;z-index:10;
  padding:calc(env(safe-area-inset-top,0px) + 30px) var(--space-5) 0;
  display:flex;justify-content:center;
}
.brand{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:800;font-size:19px;color:#fff;transition:transform .2s}
.brand:hover{transform:translateY(-1px)}
.logo-mark{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:#fff;
  border:1px solid var(--cyan-border);
  box-shadow:0 0 16px rgba(56,189,248,.22);
  overflow:hidden;
}
.logo-mark img{width:96%;height:96%;object-fit:contain;display:block}
.brand .mid{color:var(--cyan)}
.brand .ai{color:var(--text-300);font-weight:700}

/* layout */
.wrap{
  position:relative;z-index:10;flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:clamp(36px,9vh,72px) var(--space-5) calc(48px + env(safe-area-inset-bottom,0px));
}
.auth{width:100%;max-width:420px;animation:rise .6s ease both}

.welcome{text-align:center;margin-bottom:var(--space-8)}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;display:inline-flex;align-items:center;gap:8px}
.eyebrow .live-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
.welcome h1{font-family:var(--font-display);font-weight:800;font-size:clamp(28px,8vw,38px);line-height:1.05;letter-spacing:-.02em;color:#fff}
.welcome p{color:var(--text-300);font-size:15px;margin-top:10px}

/* card */
.card-zone{position:relative;margin-top:70px}
.mascot{
  position:absolute;left:50%;top:0;
  width:88px;height:auto;
  transform:translate(-50%,-72%);
  z-index:3;pointer-events:none;
  filter:drop-shadow(0 8px 14px rgba(56,189,248,.4));
  animation:perch 4.5s ease-in-out infinite;
}
@media(min-width:420px){.mascot{width:100px}}
.card{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--bg-card-hi),var(--bg-card));
  border:1px solid var(--cyan-border-soft);
  border-radius:var(--r-xl);
  padding:var(--space-6);
  box-shadow:0 20px 50px rgba(0,0,0,.45);
}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 0% 0%,rgba(56,189,248,.07),transparent 55%);pointer-events:none}

.field{margin-bottom:var(--space-5);position:relative;z-index:1}
.field label{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-400);margin-bottom:9px}
.input-wrap{position:relative;display:flex;align-items:center}
.input-wrap .lead{position:absolute;left:14px;display:flex;color:var(--text-500);pointer-events:none}
.input-wrap .lead svg{width:17px;height:17px}
.field input{
  width:100%;
  background:var(--bg-elev-1);
  border:1px solid var(--border-mid);
  border-radius:var(--r-md);
  padding:14px 14px 14px 42px;
  color:var(--text-100);font-family:var(--font-body);font-size:15px;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.field input::placeholder{color:var(--text-500)}
.field input:focus{outline:none;border-color:var(--cyan);background:var(--bg-elev-2);box-shadow:0 0 0 3px rgba(56,189,248,.14)}
.field input.has-toggle{padding-right:46px}
.toggle-pw{position:absolute;right:8px;width:34px;height:34px;border:none;background:transparent;color:var(--text-400);display:flex;align-items:center;justify-content:center;border-radius:8px;transition:color .2s,background .2s}
.toggle-pw:hover{color:var(--cyan);background:var(--cyan-bg-soft)}
.toggle-pw svg{width:18px;height:18px}

/* row: remember + forgot */
.form-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:var(--space-6);flex-wrap:wrap}
.remember{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.remember input{position:absolute;opacity:0;width:0;height:0}
.checkbox{
  width:20px;height:20px;border-radius:6px;flex-shrink:0;
  background:var(--bg-elev-1);border:1px solid var(--border-mid);
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.checkbox svg{width:12px;height:12px;color:#031020;opacity:0;transform:scale(.5);transition:all .2s}
.remember input:checked + .checkbox{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(56,189,248,.4)}
.remember input:checked + .checkbox svg{opacity:1;transform:scale(1)}
.remember input:focus-visible + .checkbox{box-shadow:0 0 0 3px rgba(56,189,248,.25)}
.remember span{font-size:13.5px;color:var(--text-300)}
.forgot{font-size:13.5px;color:var(--cyan);font-weight:600;transition:color .2s}
.forgot:hover{color:var(--cyan-3)}

/* buttons */
.btn{
  display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
  padding:15px;border-radius:var(--r-md);border:none;
  font:700 15px var(--font-body);transition:transform .2s,box-shadow .2s,background .2s,border-color .2s;
}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--cyan);color:#031020;box-shadow:0 8px 26px rgba(56,189,248,.28)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(56,189,248,.42)}

.divider{display:flex;align-items:center;gap:14px;margin:var(--space-6) 0;color:var(--text-500);font-size:12px;font-family:var(--font-mono);letter-spacing:.1em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border-soft)}

.btn-google{background:var(--bg-elev-1);color:#fff;border:1px solid var(--border-mid);font-weight:600}
.btn-google:hover{transform:translateY(-2px);border-color:var(--cyan-border);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.btn-google .g-ico{width:18px;height:18px;flex-shrink:0}

/* bottom */
.bottom{text-align:center;margin-top:var(--space-8);position:relative;z-index:1}
.bottom .q{color:var(--text-400);font-size:14px;margin-bottom:20px}
.btn-ghost{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 26px;border-radius:var(--r-md);
  background:transparent;color:#fff;border:1px solid var(--cyan-border);
  font:700 14.5px var(--font-body);transition:all .2s;
}
.btn-ghost:hover{background:var(--cyan-bg-soft);border-color:var(--cyan);transform:translateY(-2px)}

@media(max-width:380px){
  .card{padding:var(--space-5)}
  .welcome{margin-bottom:var(--space-7)}
}
@media(max-height:680px){
  .wrap{align-items:flex-start}
}

@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes perch{0%,100%{transform:translate(-50%,-72%)}50%{transform:translate(-50%,-74%)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(1.4)}}
</style>
</head>

      <div class="card">
        <form id="loginForm" novalidate>

        <div class="field">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="lead">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="m2 7 10 6 10-6"/></svg>
            </span>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email"/>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="lead">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
            </span>
            <input type="password" id="password" name="password" class="has-toggle" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
              <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9.9 4.2A10.9 10.9 0 0 1 12 4c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4M6.6 6.6A18 18 0 0 0 2 11s3.5 7 10 7a10.9 10.9 0 0 0 3.4-.5M3 3l18 18M9.5 9.5a3 3 0 0 0 4.2 4.2"/></svg>
            </button>
          </div>
        </div>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" id="remember"/>
            <span class="checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
            <span>Remember me</span>
          </label>
          <a class="forgot" href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary">
          Log In
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10m-4-4 4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <div class="divider">OR</div>

        <button type="button" class="btn btn-google">
          <svg class="g-ico" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8a12 12 0 1 1 0-24c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7A20 20 0 1 0 24 44c11 0 20-8 20-20 0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7A20 20 0 0 0 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2A12 12 0 0 1 12.7 28l-6.5 5A20 20 0 0 0 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 0 1-4.1 5.6l6.2 5.2C40.9 35.7 44 30.4 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
          Continue with Google
        </button>
      </form>
      </div>
    </div>

    <!-- BOTTOM -->
    <div class="bottom">
      <div class="q">Don't have an account?</div>
      <a class="btn-ghost" href="signup.html">
        Create Account
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10m-4-4 4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ===== Supabase client =====
  const SUPABASE_URL = 'https://igvkyxkmjnkzscqgommj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_MTRD_njnCX-1CobeqTIMiw_QhNYarXp';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ===== Redirect based on onboarding status =====
  async function routeAfterAuth(userId) {
    try {
      const { data: profile } = await supabaseClient
        .from('profiles').select('onboarding_completed').eq('id', userId).single();
      if (profile && profile.onboarding_completed === true) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'onboarding.html';
      }
    } catch (e) {
      // If profile can't be read, send to onboarding to complete setup
      window.location.href = 'onboarding.html';
    }
  }

  // ===== Session check — redirect if already logged in =====
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session && session.user) routeAfterAuth(session.user.id);
  })();

  // ===== Show / hide password =====
  const pw = document.getElementById('password');
  const toggle = document.getElementById('togglePw');
  const eyeOpen = document.getElementById('eyeOpen');
  const eyeOff = document.getElementById('eyeOff');
  toggle.addEventListener('click', () => {
    const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    eyeOpen.style.display = show ? 'none' : 'block';
    eyeOff.style.display = show ? 'block' : 'none';
    toggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });

  // ===== Login form =====
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      alert('Please enter your email and password.');
      return;
    }

    const submitBtn = e.target.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.style.opacity = '0.7'; }

    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        alert(error.message);
        if (submitBtn) { submitBtn.disabled = false; submitBtn.style.opacity = '1'; }
      } else {
        routeAfterAuth(data.user.id);
      }
    } catch (err) {
      alert(err.message || 'Something went wrong. Please try again.');
      if (submitBtn) { submitBtn.disabled = false; submitBtn.style.opacity = '1'; }
    }
  });

  // ===== Logout function (use this anywhere in dashboard) =====
  async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  }
</script>
