<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Si Math AI — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050a14;--bg-elev-1:#0a1224;--bg-elev-2:#0e1830;--bg-card:#0c1428;--bg-card-hi:#101a32;
  --cyan:#38bdf8;--cyan-2:#0ea5e9;--cyan-3:#7dd3fc;
  --cyan-bg-soft:rgba(56,189,248,.1);--cyan-bg-med:rgba(56,189,248,.16);
  --cyan-border:rgba(56,189,248,.28);--cyan-border-soft:rgba(56,189,248,.14);
  --green:#22c55e;--green-soft:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.32);
  --amber:#f5b942;--amber-soft:rgba(245,185,66,.12);--amber-border:rgba(245,185,66,.32);
  --red:#ef4f5f;--red-soft:rgba(239,79,95,.12);--red-border:rgba(239,79,95,.32);
  --purple:#a855f7;--purple-soft:rgba(168,85,247,.12);--purple-border:rgba(168,85,247,.32);
  --gold:#f59e0b;--gold-soft:rgba(245,158,11,.12);--gold-border:rgba(245,158,11,.32);
  --text-100:#fff;--text-200:#dde8f7;--text-300:#a8bcd9;--text-400:#7a90b2;--text-500:#536b8c;
  --border-soft:#1a2540;--border-mid:#26334d;
  --space-4:16px;--space-5:20px;--space-6:24px;--space-7:32px;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:24px;
  --font-display:'Manrope',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --nav-h:58px;--side-w:262px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{background:#050a14;color:var(--text-200);font-family:var(--font-body);font-size:15px;line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb-1{width:420px;height:420px;background:radial-gradient(circle,rgba(56,189,248,.11),transparent 70%);top:-140px;right:-120px}
.orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(14,165,233,.07),transparent 70%);bottom:-80px;left:-100px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:60;height:calc(var(--nav-h) + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;gap:12px;padding-left:16px;padding-right:16px;background:rgba(5,10,20,.97);border-bottom:1px solid var(--border-soft)}
.hamb{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;color:var(--text-200)}
.hamb svg{width:18px;height:18px}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:17px;color:#fff}
.logo-mark{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--cyan-border);box-shadow:0 0 16px rgba(56,189,248,.22);overflow:hidden}
.logo-mark img{width:96%;height:96%;object-fit:contain;display:block}
.brand .mid{color:var(--cyan)}.brand .ai{color:var(--text-300);font-weight:700}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-avatar{width:34px;height:34px;border-radius:50%;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--cyan);cursor:pointer}

/* SIDEBAR */
.sidebar{position:fixed;z-index:70;top:0;bottom:0;left:0;width:var(--side-w);background:var(--bg-elev-1);border-right:1px solid var(--border-soft);padding:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 14px) 14px 18px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;transform:translateX(-100%);transition:transform .32s cubic-bezier(.5,.1,.25,1)}
.sidebar.open{transform:translateX(0)}
.side-sec{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-500);margin:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:var(--text-300);font-weight:500;font-size:14.5px;position:relative;border:1px solid transparent;transition:all .2s}
.nav-item svg{width:18px;height:18px;flex-shrink:0;color:var(--text-400);transition:color .2s}
.nav-item:hover{background:var(--bg-card);color:var(--text-100)}
.nav-item:hover svg{color:var(--cyan)}
.nav-item.active{background:var(--cyan-bg-soft);color:#fff;border-color:var(--cyan-border-soft)}
.nav-item.active svg{color:var(--cyan)}
.nav-item.active::before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 4px 4px 0;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.overlay{position:fixed;inset:0;z-index:65;background:rgba(2,6,14,.66);opacity:0;visibility:hidden;transition:opacity .3s}
.overlay.show{opacity:1;visibility:visible}

/* MAIN */
.main{position:relative;z-index:10;padding:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 20px) 16px calc(40px + env(safe-area-inset-bottom,0px));max-width:1200px;margin:0 auto}

/* GRID */
.dash-grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:768px){.dash-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1100px){.dash-grid-3{grid-template-columns:1fr 1fr 1fr}}

/* CARDS */
.card{position:relative;overflow:hidden;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:20px;animation:rise .5s ease both}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.card-ico{width:40px;height:40px;flex-shrink:0;border-radius:11px;font-size:18px;display:flex;align-items:center;justify-content:center;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border)}
.card-title{font-family:var(--font-display);font-weight:700;font-size:16px;color:#fff}
.card-sub{font-size:12px;color:var(--text-400);margin-top:1px}
.sec-label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-500);margin:28px 4px 12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border-soft)}

/* WELCOME */
.welcome{background:linear-gradient(135deg,rgba(56,189,248,.14),var(--bg-card));border:1px solid var(--cyan-border);border-radius:var(--r-xl);padding:24px;animation:rise .5s ease both}
.welcome-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.welcome-av{width:52px;height:52px;border-radius:14px;background:#fff;border:1px solid var(--cyan-border);overflow:hidden;flex-shrink:0}
.welcome-av img{width:100%;height:100%;object-fit:contain}
.welcome-greeting{font-family:var(--font-display);font-weight:800;font-size:clamp(20px,5vw,26px);color:#fff;line-height:1.1}
.welcome-date{font-family:var(--font-mono);font-size:11px;color:var(--text-400);margin-top:3px}
.zero-msg{display:flex;align-items:flex-start;gap:10px;background:rgba(56,189,248,.07);border:1px solid var(--cyan-border-soft);border-radius:12px;padding:12px 14px}
.zero-msg .zm-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);flex-shrink:0;margin-top:5px}
.zero-msg p{font-size:13.5px;color:var(--text-300);line-height:1.5}
.zero-msg p b{color:#fff}

/* GOALS CHIPS */
.goals-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:0}
.goal-chip{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:100px;background:var(--bg-elev-1);border:1px solid var(--border-mid);font-size:12.5px;color:var(--text-300)}
.goal-chip svg{width:13px;height:13px;color:var(--cyan);flex-shrink:0}
.goal-chip b{color:#fff;font-weight:600}
.goal-chip.green{border-color:var(--green-border);background:var(--green-soft)}
.goal-chip.green b{color:var(--green)}
.goal-chip.amber{border-color:var(--amber-border);background:var(--amber-soft)}
.goal-chip.amber b{color:var(--amber)}
.goal-chip.red{border-color:var(--red-border);background:var(--red-soft)}
.goal-chip.red b{color:var(--red)}

/* WEAKNESS CARD */
.weakness-card{background:linear-gradient(135deg,var(--red-soft),var(--bg-card));border:1px solid var(--red-border);border-radius:var(--r-lg);padding:20px;animation:rise .5s .05s ease both}
.wk-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.wk-badge{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:100px;background:var(--red-soft);border:1px solid var(--red-border);color:var(--red)}
.wk-title{font-family:var(--font-display);font-weight:800;font-size:20px;color:#fff}
.wk-sub{font-size:12.5px;color:var(--text-400);margin-top:2px}
.wk-mastery{display:flex;align-items:center;gap:10px;margin:12px 0}
.wk-bar{flex:1;height:6px;background:var(--bg-elev-1);border-radius:3px;overflow:hidden}
.wk-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.wk-start-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--cyan-2),var(--cyan));color:#031020;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13.5px;border:none;transition:all .2s;text-decoration:none}
.wk-start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(56,189,248,.35)}
.wk-start-btn svg{width:15px;height:15px}

/* QUICK ACTIONS */
.qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.qa-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border-radius:var(--r-md);background:var(--bg-elev-1);border:1px solid var(--border-soft);color:var(--text-200);transition:all .2s;text-align:center}
.qa-btn:hover{border-color:var(--cyan-border);transform:translateY(-2px);background:var(--cyan-bg-soft);color:#fff}
.qa-btn .qa-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--bg-card);border:1px solid var(--border-mid)}
.qa-btn:hover .qa-ico{background:var(--cyan-bg-soft);border-color:var(--cyan-border)}
.qa-btn span{font-size:12px;font-weight:600}

/* RECENT ACTIVITY */
.activity-list{display:flex;flex-direction:column;gap:8px}
.act-item{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--bg-elev-1);border:1px solid var(--border-soft);border-radius:var(--r-md);transition:all .2s}
.act-item:hover{border-color:var(--cyan-border-soft)}
.act-ico{width:34px;height:34px;flex-shrink:0;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px}
.act-ico.chat{background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft)}
.act-ico.exam{background:var(--green-soft);border:1px solid var(--green-border)}
.act-body{flex:1;min-width:0}
.act-name{font-size:13px;font-weight:600;color:var(--text-200);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-meta{font-family:var(--font-mono);font-size:10.5px;color:var(--text-500);margin-top:1px}

/* WEEKLY CHART */
.week-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:8px}
.wc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wc-bar-wrap{flex:1;display:flex;align-items:flex-end;width:100%}
.wc-bar{width:100%;border-radius:4px 4px 0 0;background:var(--cyan-bg-med);border:1px solid var(--cyan-border-soft);min-height:4px;transition:height .6s ease}
.wc-bar.has-data{background:linear-gradient(180deg,var(--cyan),var(--cyan-2));border-color:var(--cyan-border)}
.wc-day{font-family:var(--font-mono);font-size:9px;color:var(--text-500);text-align:center}
.wc-day.today{color:var(--cyan)}

/* XP CARD */
.xp-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:20px;animation:rise .5s .1s ease both}
.rank-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:100px;font-family:var(--font-display);font-weight:700;font-size:13px;margin-bottom:14px}
.xp-bar-wrap{height:8px;background:var(--bg-elev-1);border-radius:100px;overflow:hidden;margin:10px 0 8px}
.xp-bar-fill{height:100%;border-radius:100px;transition:width 1s ease;box-shadow:0 0 10px currentColor}
.xp-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--text-400)}
.rank-ladder{display:flex;gap:4px;margin-top:14px;overflow-x:auto}
.rl-item{flex:1;min-width:48px;text-align:center;padding:6px 4px;border-radius:6px;border:1px solid var(--border-soft);background:var(--bg-elev-1)}
.rl-item.current{border-color:currentColor}
.rl-dot{width:8px;height:8px;border-radius:50%;margin:0 auto 4px}
.rl-name{font-family:var(--font-mono);font-size:8px;color:var(--text-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rl-item.current .rl-name{font-weight:700}

/* ACHIEVEMENTS */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:480px){.ach-grid{grid-template-columns:repeat(3,1fr)}}
.ach-item{padding:12px;border-radius:var(--r-md);border:1px solid var(--border-soft);background:var(--bg-elev-1);text-align:center}
.ach-item.earned{border-color:var(--amber-border);background:var(--gold-soft)}
.ach-ico{font-size:22px;margin-bottom:6px}
.ach-name{font-size:11.5px;font-weight:700;color:var(--text-200)}
.ach-item.earned .ach-name{color:var(--gold)}
.ach-date{font-family:var(--font-mono);font-size:9.5px;color:var(--text-500);margin-top:2px}

@media(min-width:1024px){
  .hamb{display:none}.sidebar{transform:translateX(0)}.overlay{display:none!important}
  .main{padding-left:calc(var(--side-w) + 28px);padding-right:28px;max-width:1360px}
  .topbar{padding-left:calc(var(--side-w) + 28px)}.brand.in-topbar{display:none}
}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

// ===== SYSTEM TOPICS FILTER =====
const SYSTEM_TOPICS = new Set(['confidence','session start','study coaching','problem clarification','off-topic','specialization','zero','general','greeting','feedback','test taking','motivation','other','none','unknown','miscellaneous','meta','system','chat','intro','introduction','clarification','encouragement','off topic','test-taking','hint','hints','explanation','review']);
function isAcademicTopic(t) { return !!(t && t.trim().length >= 2 && !SYSTEM_TOPICS.has(t.toLowerCase().trim())); }

// ===== computeTopicProfile (same as focus.html) =====
const DAY = 86400000;
function computeTopicProfile(entry) {
  const now = Date.now();
  const times = entry.records.map(t => new Date(t).getTime());
  const total = times.length;
  if (total < 2) return null;
  const last7  = times.filter(t => now - t < 7  * DAY).length;
  const last14 = times.filter(t => now - t < 14 * DAY).length;
  const prev7  = times.filter(t => now - t >= 7 * DAY && now - t < 14 * DAY).length;
  let decayScore = 0;
  times.forEach(t => { decayScore += Math.exp(-(now - t) / (DAY * 14)); });
  const weakSignals = entry.weakSignals || 0;
  const helpReqs    = entry.helpRequests || 0;
  const examMistakes = entry.examMistakes || 0;
  const confAfterArr = (entry.confAfterArr || []).filter(c => c != null && c > 0);
  const avgConf = confAfterArr.length > 0 ? confAfterArr.reduce((a,b)=>a+b,0)/confAfterArr.length : null;
  const highConfCount = confAfterArr.filter(c => c >= 4).length;
  let mastery;
  if (entry.masteryScore !== null && entry.masteryScore !== undefined) {
    mastery = Math.round(Number(entry.masteryScore));
  } else {
    const chatWeaknessScore = (weakSignals * 3) + (helpReqs * 2) + (entry.explRequests||0) * 1.5 + (entry.repeated||0) * 2;
    const baseScore = (total * 1.5) + (decayScore * 3) + (last7 * 2) + (examMistakes * 3);
    mastery = Math.max(10, Math.min(95, Math.round(100 - (baseScore + chatWeaknessScore) * 4 + highConfCount * 4)));
  }
  let priority, priorityClass;
  if (mastery < 30)      { priority='Critical'; priorityClass='critical'; }
  else if (mastery < 50) { priority='High';     priorityClass='high'; }
  else if (mastery < 70) { priority='Medium';   priorityClass='med'; }
  else                   { priority='Low';       priorityClass='low'; }
  const mastered = mastery >= 90 && total >= 4 && examMistakes === 0;
  const strength = mastery >= 75 && total >= 3 && !mastered;
  const recentlyMastered = !strength && !mastered && mastery >= 70 && total >= 2 && last14 === 0;
  return { topic: entry.topic, sub: entry.sub, mastery, priority, priorityClass, total, decayScore, strength, mastered, recentlyMastered };
}

// ===== XP / RANK helpers =====
const RANKS = [
  { name:'Beginner',      min:0,    color:'#7a90b2', bg:'rgba(122,144,178,.12)', border:'rgba(122,144,178,.3)' },
  { name:'Learner',       min:100,  color:'#38bdf8', bg:'rgba(56,189,248,.12)',  border:'rgba(56,189,248,.3)' },
  { name:'Solver',        min:300,  color:'#f5b942', bg:'rgba(245,185,66,.12)',  border:'rgba(245,185,66,.3)' },
  { name:'Scholar',       min:600,  color:'#22c55e', bg:'rgba(34,197,94,.12)',   border:'rgba(34,197,94,.3)' },
  { name:'Expert',        min:1000, color:'#a855f7', bg:'rgba(168,85,247,.12)', border:'rgba(168,85,247,.3)' },
  { name:'Master',        min:1500, color:'#ef4f5f', bg:'rgba(239,79,95,.12)',  border:'rgba(239,79,95,.3)' },
  { name:'Elite Scholar', min:2500, color:'#f59e0b', bg:'rgba(245,158,11,.12)', border:'rgba(245,158,11,.3)' },
];
function getRankInfo(xp) {
  let r = RANKS[0];
  for (const rank of RANKS) { if (xp >= rank.min) r = rank; }
  return r;
}
function getNextRank(xp) { return RANKS.find(r => r.min > xp) || null; }

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function relTime(dateStr) {
  const d = new Date(dateStr), now = Date.now(), diff = now - d.getTime();
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  if (diff < 172800000) return 'Yesterday';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr).getTime() - Date.now()) / 86400000);
}
function masteryColor(m) {
  if (m < 30) return '#f87171';
  if (m < 50) return 'var(--red)';
  if (m < 70) return 'var(--amber)';
  return 'var(--green)';
}

// ===== MAIN =====
async function loadDashboard() {
  const { data:{ user } } = await sb.auth.getUser();
  if (!user) { window.location.href = 'login.html'; return; }

  // Update avatar
  const initials = (user.email || '?').slice(0,1).toUpperCase();
  document.getElementById('topAvatar').textContent = initials;

  const [profRes, sessRes, examRes, achRes, mastRes, examMistRes] = await Promise.all([
    sb.from('profiles').select('*').eq('id', user.id).single(),
    sb.from('chat_sessions').select('id,title,created_at').eq('user_id', user.id).order('created_at', { ascending:false }).limit(10),
    sb.from('exam_practice_sessions').select('*').eq('user_id', user.id).order('created_at', { ascending:false }).limit(10),
    sb.from('achievements').select('*').eq('user_id', user.id).order('unlocked_at', { ascending:false }).limit(3),
    sb.from('mastery_records').select('topic,subtopic,mastery_score,questions_seen,last_updated').eq('user_id', user.id),
    sb.from('exam_mistakes').select('topic,subtopic').eq('user_id', user.id),
  ]);

  const profile  = profRes.data || {};
  const sessions = sessRes.data || [];
  const exams    = examRes.data || [];
  const achievements = achRes.data || [];
  const mastRecs = mastRes.data || [];
  const examMist = examMistRes.data || [];

  // Fetch question records for weakness analysis
  const sessionIds = sessions.map(s => s.id);
  let records = [];
  if (sessionIds.length > 0) {
    const { data:qData } = await sb.from('question_records')
      .select('topic,subtopic,concepts,created_at,weakness_signal,help_request,explanation_request,repeated_question,confidence_after')
      .in('session_id', sessionIds)

        </div>
        <div style="margin-top:14px;font-size:12.5px;color:var(--text-400)">
          Goal: <b style="color:#fff">${profile.study_sessions_per_week||3} sessions/week</b>
          · This week: <b style="color:var(--cyan)">${weekDays.reduce((s,d)=>s+d.count,0)} sessions</b>
        </div>
      </div>
    </div>

    <!-- ACHIEVEMENTS PREVIEW -->
    ${achievements.length > 0 ? `
    <div class="sec-label">Recent Achievements</div>
    <div class="ach-grid">
      ${achievements.map(a => `
      <div class="ach-item earned">
        <div class="ach-ico">🏆</div>
        <div class="ach-name">${escHtml(a.achievement_name)}</div>
        <div class="ach-date">${relTime(a.unlocked_at)}</div>
      </div>`).join('')}
      <div class="ach-item" style="display:flex;align-items:center;justify-content:center">
        <a href="profile.html" style="font-family:var(--font-mono);font-size:11px;color:var(--cyan)">View all →</a>
      </div>
    </div>` : ''}
  `;

  document.getElementById('pageContent').innerHTML = html;
}

loadDashboard().catch(err => {
  document.getElementById('pageContent').innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-400)"><div style="font-size:40px;margin-bottom:12px">⚠️</div><p>${err.message}</p></div>`;
});
</script>
</body>
</html>
