<title>Si Math AI — Create Account</title>

<style>
:root{
  --bg:#050a14;
  --bg-elev-1:#0a1224;
  --bg-elev-2:#0e1830;
  --bg-card:#0c1428;
  --bg-card-hi:#101a32;

  --cyan:#38bdf8;
  --cyan-2:#0ea5e9;
  --cyan-3:#7dd3fc;
  --cyan-bg-soft:rgba(56,189,248,.1);
  --cyan-bg-med:rgba(56,189,248,.16);
  --cyan-border:rgba(56,189,248,.28);
  --cyan-border-soft:rgba(56,189,248,.14);

  --green:#22c55e;--amber:#f5b942;--red:#ef4f5f;

  --text-100:#ffffff;
  --text-200:#dde8f7;
  --text-300:#a8bcd9;
  --text-400:#7a90b2;
  --text-500:#536b8c;
  --border-soft:#1a2540;
  --border-mid:#26334d;

  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;
  --space-5:20px;--space-6:24px;--space-7:32px;--space-8:40px;

  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:24px;
  --font-display:'Manrope',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{
  background-color:#050a14 !important;
  background:#050a14 !important;
  color:var(--text-200);
  font-family:var(--font-body);
  font-size:15px;line-height:1.55;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100vh;
  min-height:100dvh;
  position:relative;
  display:flex;flex-direction:column;
}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb-1{width:380px;height:380px;background:radial-gradient(circle,rgba(56,189,248,.12),transparent 70%);top:-120px;right:-120px}
.orb-2{width:280px;height:280px;background:radial-gradient(circle,rgba(14,165,233,.08),transparent 70%);bottom:-60px;left:-100px}

a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* logo */
.logo-bar{
  position:relative;z-index:10;
  padding:calc(env(safe-area-inset-top,0px) + 30px) var(--space-5) 0;
  display:flex;justify-content:center;
}
.brand{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:800;font-size:19px;color:#fff;transition:transform .2s}
.brand:hover{transform:translateY(-1px)}
.logo-mark{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:#fff;
  border:1px solid var(--cyan-border);
  box-shadow:0 0 16px rgba(56,189,248,.22);
  overflow:hidden;
}
.logo-mark img{width:96%;height:96%;object-fit:contain;display:block}
.brand .mid{color:var(--cyan)}
.brand .ai{color:var(--text-300);font-weight:700}

/* layout */
.wrap{
  position:relative;z-index:10;flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:clamp(32px,7vh,60px) var(--space-5) calc(48px + env(safe-area-inset-bottom,0px));
}
.auth{width:100%;max-width:420px;animation:rise .6s ease both}

.welcome{text-align:center;margin-bottom:var(--space-8)}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;display:inline-flex;align-items:center;gap:8px}
.eyebrow .live-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
.welcome h1{font-family:var(--font-display);font-weight:800;font-size:clamp(26px,7.5vw,36px);line-height:1.08;letter-spacing:-.02em;color:#fff}
.welcome p{color:var(--text-300);font-size:15px;margin-top:10px;max-width:360px;margin-left:auto;margin-right:auto}

/* card + mascot */
.card-zone{position:relative;margin-top:70px}
.mascot{
  position:absolute;left:50%;top:0;
  width:92px;height:auto;
  transform:translate(-50%,-68%);
  z-index:3;pointer-events:none;
  filter:drop-shadow(0 8px 14px rgba(56,189,248,.4));
  animation:perch 4.5s ease-in-out infinite;
}
@media(min-width:420px){.mascot{width:104px}}

.card{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--bg-card-hi),var(--bg-card));
  border:1px solid var(--cyan-border-soft);
  border-radius:var(--r-xl);
  padding:var(--space-6);
  box-shadow:0 20px 50px rgba(0,0,0,.45);
}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 0% 0%,rgba(56,189,248,.07),transparent 55%);pointer-events:none}

.field{margin-bottom:var(--space-5);position:relative;z-index:1}
.field label{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-400);margin-bottom:9px}
.input-wrap{position:relative;display:flex;align-items:center}
.input-wrap .lead{position:absolute;left:14px;display:flex;color:var(--text-500);pointer-events:none}
.input-wrap .lead svg{width:17px;height:17px}
.field input{
  width:100%;
  background:var(--bg-elev-1);
  border:1px solid var(--border-mid);
  border-radius:var(--r-md);
  padding:14px 14px 14px 42px;
  color:var(--text-100);font-family:var(--font-body);font-size:15px;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.field input::placeholder{color:var(--text-500)}
.field input:focus{outline:none;border-color:var(--cyan);background:var(--bg-elev-2);box-shadow:0 0 0 3px rgba(56,189,248,.14)}
.field input.has-toggle{padding-right:46px}
.toggle-pw{position:absolute;right:8px;width:34px;height:34px;border:none;background:transparent;color:var(--text-400);display:flex;align-items:center;justify-content:center;border-radius:8px;transition:color .2s,background .2s}
.toggle-pw:hover{color:var(--cyan);background:var(--cyan-bg-soft)}
.toggle-pw svg{width:18px;height:18px}

/* password strength */
.strength{margin-top:10px}
.strength-bars{display:flex;gap:6px}
.strength-bars i{flex:1;height:4px;border-radius:100px;background:var(--bg-elev-2);transition:background .3s,box-shadow .3s}
.strength-bars i.on-1{background:var(--red);box-shadow:0 0 6px rgba(239,79,95,.5)}
.strength-bars i.on-2{background:var(--amber);box-shadow:0 0 6px rgba(245,185,66,.5)}
.strength-bars i.on-3{background:var(--cyan);box-shadow:0 0 6px rgba(56,189,248,.5)}
.strength-bars i.on-4{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5)}
.strength-text{font-family:var(--font-mono);font-size:11px;margin-top:7px;color:var(--text-500);letter-spacing:.04em}
.strength-text.t-1{color:var(--red)}
.strength-text.t-2{color:var(--amber)}
.strength-text.t-3{color:var(--cyan)}
.strength-text.t-4{color:var(--green)}

.match-note{font-family:var(--font-mono);font-size:11px;margin-top:8px;display:flex;align-items:center;gap:6px}
.match-note.ok{color:var(--green)}
.match-note.bad{color:var(--red)}
.match-note svg{width:13px;height:13px}

/* buttons */
.btn{
  display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
  padding:15px;border-radius:var(--r-md);border:none;
  font:700 15px var(--font-body);transition:transform .2s,box-shadow .2s,background .2s,border-color .2s;
  margin-top:var(--space-2);
}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--cyan);color:#031020;box-shadow:0 8px 26px rgba(56,189,248,.28)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(56,189,248,.42)}

.divider{display:flex;align-items:center;gap:14px;margin:var(--space-6) 0;color:var(--text-500);font-size:12px;font-family:var(--font-mono);letter-spacing:.1em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border-soft)}

.btn-google{background:var(--bg-elev-1);color:#fff;border:1px solid var(--border-mid);font-weight:600;margin-top:0}
.btn-google:hover{transform:translateY(-2px);border-color:var(--cyan-border);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.btn-google .g-ico{width:18px;height:18px;flex-shrink:0}
.btn-social{margin-top:10px}

/* bottom */
.bottom{text-align:center;margin-top:var(--space-8);position:relative;z-index:1}
.bottom .q{color:var(--text-400);font-size:14px;margin-bottom:20px}
.btn-ghost{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 26px;border-radius:var(--r-md);
  background:transparent;color:#fff;border:1px solid var(--cyan-border);
  font:700 14.5px var(--font-body);transition:all .2s;
}
.btn-ghost:hover{background:var(--cyan-bg-soft);border-color:var(--cyan);transform:translateY(-2px)}

@media(max-width:380px){
  .card{padding:var(--space-5)}
  .welcome{margin-bottom:var(--space-7)}
}
@media(max-height:740px){
  .wrap{align-items:flex-start}
}

@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(1.4)}}
@keyframes perch{0%,100%{transform:translate(-50%,-68%)}50%{transform:translate(-50%,-70%)}}
</style>
</head>

<script>
  // Show / hide password (both fields)
  document.querySelectorAll('.toggle-pw').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const input=document.getElementById(btn.dataset.target);
      const open=btn.querySelector('.eye-open');
      const off=btn.querySelector('.eye-off');
      const show=input.type==='password';
      input.type=show?'text':'password';
      open.style.display=show?'none':'block';
      off.style.display=show?'block':'none';
      btn.setAttribute('aria-label',show?'Hide password':'Show password');
    });
  });

  // Password strength
  const pw=document.getElementById('password');
  const bars=[document.getElementById('sb1'),document.getElementById('sb2'),document.getElementById('sb3'),document.getElementById('sb4')];
  const sText=document.getElementById('strengthText');
  const labels=['','Weak','Fair','Good','Strong'];
  function scorePw(v){
    let s=0;
    if(v.length>=8) s++;
    if(/[A-Z]/.test(v)&&/[a-z]/.test(v)) s++;
    if(/\d/.test(v)) s++;
    if(/[^A-Za-z0-9]/.test(v)) s++;
    if(v.length<6) s=Math.min(s,1);
    return s;
  }
