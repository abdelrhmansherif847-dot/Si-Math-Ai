<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Profile – Si Math AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#050a14;--bg-elev-1:#0a1224;--bg-elev-2:#0e1830;--bg-card:#0c1428;--bg-card-hi:#101a32;
  --cyan:#38bdf8;--cyan-2:#0ea5e9;--cyan-3:#7dd3fc;
  --cyan-bg-soft:rgba(56,189,248,.1);--cyan-bg-med:rgba(56,189,248,.16);
  --cyan-border:rgba(56,189,248,.28);--cyan-border-soft:rgba(56,189,248,.14);
  --green:#22c55e;--green-soft:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.32);
  --amber:#f5b942;--amber-soft:rgba(245,185,66,.12);--amber-border:rgba(245,185,66,.32);
  --red:#ef4f5f;--red-soft:rgba(239,79,95,.12);--red-border:rgba(239,79,95,.32);
  --purple:#a855f7;--purple-soft:rgba(168,85,247,.12);--purple-border:rgba(168,85,247,.32);
  --gold:#f59e0b;--gold-soft:rgba(245,158,11,.12);--gold-border:rgba(245,158,11,.32);
  --text-100:#fff;--text-200:#dde8f7;--text-300:#a8bcd9;--text-400:#7a90b2;--text-500:#536b8c;
  --border-soft:#1a2540;--border-mid:#26334d;
  --space-4:16px;--space-5:20px;--space-6:24px;--space-7:32px;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:24px;
  --font-display:'Manrope',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --nav-h:58px;--side-w:262px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{background:#050a14;color:var(--text-200);font-family:var(--font-body);font-size:15px;line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb-1{width:420px;height:420px;background:radial-gradient(circle,rgba(56,189,248,.11),transparent 70%);top:-140px;right:-120px}
.orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(14,165,233,.07),transparent 70%);bottom:-80px;left:-100px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

.topbar{position:fixed;top:0;left:0;right:0;z-index:60;height:calc(var(--nav-h) + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;gap:12px;padding-left:16px;padding-right:16px;background:rgba(5,10,20,.97);border-bottom:1px solid var(--border-soft)}
.hamb{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;color:var(--text-200)}
.hamb svg{width:18px;height:18px}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:17px;color:#fff}
.logo-mark{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--cyan-border);box-shadow:0 0 16px rgba(56,189,248,.22);overflow:hidden}
.logo-mark img{width:96%;height:96%;object-fit:contain;display:block}
.brand .mid{color:var(--cyan)}.brand .ai{color:var(--text-300);font-weight:700}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-avatar{width:34px;height:34px;border-radius:50%;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--cyan);cursor:pointer}

.sidebar{position:fixed;z-index:70;top:0;bottom:0;left:0;width:var(--side-w);background:var(--bg-elev-1);border-right:1px solid var(--border-soft);padding:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 14px) 14px 18px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;transform:translateX(-100%);transition:transform .32s cubic-bezier(.5,.1,.25,1)}
.sidebar.open{transform:translateX(0)}
.side-sec{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-500);margin:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:var(--text-300);font-weight:500;font-size:14.5px;position:relative;border:1px solid transparent;transition:all .2s}
.nav-item svg{width:18px;height:18px;flex-shrink:0;color:var(--text-400);transition:color .2s}
.nav-item:hover{background:var(--bg-card);color:var(--text-100)}
.nav-item:hover svg{color:var(--cyan)}
.nav-item.active{background:var(--cyan-bg-soft);color:#fff;border-color:var(--cyan-border-soft)}
.nav-item.active svg{color:var(--cyan)}
.nav-item.active::before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 4px 4px 0;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.overlay{position:fixed;inset:0;z-index:65;background:rgba(2,6,14,.66);opacity:0;visibility:hidden;transition:opacity .3s}
.overlay.show{opacity:1;visibility:visible}

.main{position:relative;z-index:10;padding:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 20px) 16px calc(40px + env(safe-area-inset-bottom,0px));max-width:1200px;margin:0 auto}

.card{position:relative;overflow:hidden;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:20px;animation:rise .5s ease both}
.sec-label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-500);margin:28px 4px 12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border-soft)}

/* Profile hero */
.profile-hero{background:linear-gradient(135deg,rgba(56,189,248,.1),var(--bg-card));border:1px solid var(--cyan-border);border-radius:var(--r-xl);padding:28px;display:flex;align-items:center;gap:24px;margin-bottom:8px;animation:rise .5s ease both;flex-wrap:wrap}
.hero-avatar{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;border:2px solid var(--cyan-border);box-shadow:0 0 24px rgba(56,189,248,.2)}
.hero-info{flex:1;min-width:0}
.hero-name{font-family:var(--font-display);font-weight:800;font-size:clamp(18px,4vw,24px);color:#fff;margin-bottom:3px}
.hero-email{font-family:var(--font-mono);font-size:12px;color:var(--text-400);margin-bottom:12px}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap}
.h-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-family:var(--font-display);font-weight:700;font-size:12px}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:8px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:18px;text-align:center;animation:rise .5s ease both}
.stat-val{font-family:var(--font-display);font-weight:800;font-size:1.9rem;margin-bottom:4px}
.stat-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-400)}

/* XP section */
.xp-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:20px;animation:rise .5s ease both}
.xp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.xp-rank-name{font-family:var(--font-display);font-weight:800;font-size:18px}
.xp-count-txt{font-family:var(--font-mono);font-size:12px;color:var(--text-400)}
.xp-bar-wrap{height:8px;background:var(--bg-elev-1);border-radius:100px;overflow:hidden;margin-bottom:8px}
.xp-bar-fill{height:100%;border-radius:100px;transition:width 1s ease;box-shadow:0 0 10px currentColor}
.xp-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--text-400);margin-bottom:18px}

/* Rank ladder */
.rank-ladder-grid{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.rl-step{flex:1;min-width:68px;text-align:center;padding:10px 6px;border-radius:var(--r-sm);border:1px solid var(--border-soft);background:var(--bg-elev-1)}
.rl-step.rl-current{border-color:currentColor;background:var(--cyan-bg-soft)}
.rl-step.rl-earned{opacity:.7}
.rl-dot{width:10px;height:10px;border-radius:50%;margin:0 auto 6px}
.rl-name{font-family:var(--font-mono);font-size:8.5px;color:var(--text-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rl-xp{font-family:var(--font-mono);font-size:8px;color:var(--text-500);margin-top:2px}
.rl-you{font-family:var(--font-mono);font-size:7.5px;color:var(--cyan);font-weight:700;margin-top:3px}

/* Achievements */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:500px){.ach-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.ach-grid{grid-template-columns:repeat(4,1fr)}}
.ach-item{padding:16px;border-radius:var(--r-md);border:1px solid var(--border-soft);background:var(--bg-elev-1);text-align:center;transition:all .2s}
.ach-item.earned{border-color:var(--amber-border);background:var(--gold-soft);box-shadow:0 0 16px rgba(245,158,11,.1)}
.ach-item.locked{opacity:.45}
.ach-ico{font-size:26px;margin-bottom:8px}
.ach-name{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text-200)}
.ach-item.earned .ach-name{color:var(--gold)}
.ach-desc{font-size:11px;color:var(--text-400);line-height:1.4;margin-top:3px}
.ach-date{font-family:var(--font-mono);font-size:9.5px;color:var(--text-500);margin-top:5px}

.signout-row{margin-top:28px;display:flex;justify-content:flex-end}
.btn-signout{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--r-sm);background:var(--red-soft);border:1px solid var(--red-border);color:var(--red);font-size:13.5px;font-weight:600;transition:all .2s}
.btn-signout:hover{background:rgba(239,79,95,.2);transform:translateY(-1px)}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-400)}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--cyan-border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}

@media(min-width:1024px){
  .hamb{display:none}.sidebar{transform:translateX(0)}.overlay{display:none!important}
  .main{padding-left:calc(var(--side-w) + 28px);padding-right:28px;max-width:1360px}
  .topbar{padding-left:calc(var(--side-w) + 28px)}.brand.in-topbar{display:none}
}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

function getRankInfo(xp) {
  let rank = RANKS[0];
  for (const r of RANKS) { if (xp >= r.min) rank = r; }
  return rank;
}

function getNextRank(xp) {
  for (const r of RANKS) { if (xp < r.min) return r; }
  return null;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function deviceGuard(sb, userId) {
  function _d2(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(16).padStart(8,'0');}
  var tz=(typeof Intl!=='undefined')?(Intl.DateTimeFormat().resolvedOptions().timeZone||''):'';
  var sw=Math.min(screen.width,screen.height), sh=Math.max(screen.width,screen.height);
  var fp=_d2([navigator.userAgent,sw+'x'+sh+'x'+screen.colorDepth,navigator.language||'',tz].join('|'));
  var{data:d}=await sb.from('user_devices').select('id').eq('user_id',userId).eq('device_fingerprint',fp).eq('is_active',true).maybeSingle();
  if(d) return true;
  var migs=[
    _d2([navigator.userAgent,screen.width+'x'+screen.height+'x'+screen.colorDepth,navigator.language||'',tz].join('|')),
    _d2([navigator.userAgent,screen.height+'x'+screen.width+'x'+screen.colorDepth,navigator.language||'',tz].join('|')),
    _d2([navigator.userAgent,navigator.platform||'',screen.width+'x'+screen.height+'x'+screen.colorDepth,navigator.language||'',tz].join('|'))
  ];
  for(var _i=0;_i<migs.length;_i++){
    var{data:m}=await sb.from('user_devices').select('id').eq('user_id',userId).eq('device_fingerprint',migs[_i]).eq('is_active',true).maybeSingle();
    if(m){var now=new Date().toISOString();await sb.from('user_devices').update({device_fingerprint:fp,last_seen:now,last_active:now}).eq('id',m.id);return true;}
  }
  window.location.href='devices.html?blocked=1';return false;
}

async function loadPage() {
  const { data: { user }, error: authErr } = await sb.auth.getUser();
  if (authErr || !user) { window.location.href = 'login.html'; return; }
  if (!await deviceGuard(sb, user.id)) return;

  // Update avatar
  const initials = (user.email || '?')[0].toUpperCase();
  document.getElementById('topAvatar').textContent = initials;

  const [profileRes, achRes, qRes, examRes, masteryRes] = await Promise.all([
    sb.from('profiles').select('*').eq('id', user.id).single(),
    sb.from('achievements').select('*').eq('user_id', user.id),
    sb.from('question_records').select('id').eq('user_id', user.id),
    sb.from('exam_practice_sessions').select('id').eq('user_id', user.id),
    sb.from('mastery_records').select('topic,mastery_score').eq('user_id', user.id),
  ]);

  const profile = profileRes.data || {};
  if (profile.is_admin) { const s = document.getElementById('adminNavSection'); if (s) s.style.display = 'block'; }
  const xp = profile.xp || 0;
  const rank = getRankInfo(xp);
  const nextRank = getNextRank(xp);
  const earned = achRes.data || [];

  const totalQuestions = qRes.data?.length || 0;
  const totalExams = examRes.data?.length || 0;
  const masteryRecords = masteryRes.data || [];
  const topicsStudied = masteryRecords.length;
  const masteredTopics = masteryRecords.filter(m => (m.mastery_score || 0) >= 80).length;

  const displayName = profile.full_name || user.email?.split('@')[0] || 'Student';
  const xpInRange = xp - rank.min;
  const rangeSize = nextRank ? nextRank.min - rank.min : 1;
  const xpPct = nextRank ? Math.min(100, (xpInRange / rangeSize) * 100) : 100;
  const xpToNext = nextRank ? nextRank.min - xp : 0;

  const planBadge = profile.plan === 'pro'
    ? `<span class="h-badge" style="background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)">⭐ Pro</span>`
    : `<span class="h-badge" style="background:var(--cyan-bg-soft);color:var(--cyan);border:1px solid var(--cyan-border-soft)">🆓 Free</span>`;

  let html = `
  <div class="profile-hero">
    <div class="hero-avatar" style="background:${rank.bg};border-color:${rank.color};box-shadow:0 0 24px ${rank.color}33">${rank.icon}</div>
    <div class="hero-info">
      <div class="hero-name">${escHtml(displayName)}</div>
      <div class="hero-email">${escHtml(user.email)}</div>
      <div class="hero-badges">
        <span class="h-badge" style="background:${rank.bg};color:${rank.color};border:1px solid ${rank.color}44">${rank.icon} ${rank.name}</span>
        <span class="h-badge" style="background:var(--cyan-bg-soft);color:var(--cyan);border:1px solid var(--cyan-border-soft)">⚡ ${xp.toLocaleString()} XP</span>
        ${planBadge}
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" style="color:var(--cyan)">${totalQuestions.toLocaleString()}</div>
      <div class="stat-lbl">Questions Asked</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--amber)">${totalExams.toLocaleString()}</div>
      <div class="stat-lbl">Exams Taken</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--purple)">${topicsStudied.toLocaleString()}</div>
      <div class="stat-lbl">Topics Studied</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--green)">${masteredTopics.toLocaleString()}</div>
      <div class="stat-lbl">Topics Mastered</div>
    </div>
  </div>

  <div class="sec-label">XP &amp; Rank Progress</div>
  <div class="xp-card">
    <div class="xp-header">
      <span class="xp-rank-name" style="color:${rank.color}">${rank.icon} ${rank.name}</span>
      <span class="xp-count-txt">${xp.toLocaleString()} XP${nextRank ? ` · ${xpToNext} to ${nextRank.name}` : ' · Maximum rank!'}</span>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${xpPct}%;background:${rank.color};color:${rank.color}"></div></div>
    <div class="xp-labels">
      <span>${rank.min.toLocaleString()} XP</span>
      ${nextRank ? `<span>${nextRank.min.toLocaleString()} XP</span>` : '<span>MAX</span>'}
    </div>
    <div class="rank-ladder-grid">
      ${RANKS.map(r => {
        const isCurrent = r.name === rank.name;
        const isEarned = xp >= r.min;
        return `<div class="rl-step${isCurrent ? ' rl-current' : isEarned ? ' rl-earned' : ''}" style="${isCurrent ? `border-color:${r.color}` : ''}">
          <div class="rl-dot" style="background:${isEarned ? r.color : 'var(--border-mid)'}${isCurrent ? `;box-shadow:0 0 8px ${r.color}` : ''}"></div>
          <div class="rl-name" style="${isCurrent ? `color:${r.color};font-weight:700` : ''}">${r.icon} ${r.name}</div>
          <div class="rl-xp">${r.min.toLocaleString()}</div>
          ${isCurrent ? '<div class="rl-you">← You</div>' : ''}
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="sec-label">Achievements (${earned.length} / ${ALL_ACHIEVEMENTS.length})</div>
  <div class="ach-grid">
    ${ALL_ACHIEVEMENTS.map(a => {
      const e = earned.find(x => x.achievement_key === a.key);
      return `<div class="ach-item ${e ? 'earned' : 'locked'}">
        <div class="ach-ico">${e ? a.icon : '🔒'}</div>
        <div class="ach-name">${a.name}</div>
        <div class="ach-desc">${a.desc}</div>
        ${e ? `<div class="ach-date">Earned ${fmtDate(e.earned_at)}</div>` : ''}
      </div>`;
    }).join('')}
  </div>

  <div class="signout-row">
    <button class="btn-signout" id="signOutBtn">Sign Out</button>
  </div>`;

  document.getElementById('pageContent').innerHTML = html;

  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });
}

loadPage();
</script>
</body>
</html>
