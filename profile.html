<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Profile – Si Math AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#21253a;--border:#2a2f45;
  --text:#e2e8f0;--muted:#8892a4;--accent:#6c63ff;--accent2:#4ade80;
  --warn:#f59e0b;--danger:#ef4444;--radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:0 20px 24px;font-size:1.2rem;font-weight:700;color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);text-decoration:none;font-size:.9rem;transition:.15s}
.nav-item:hover,.nav-item.active{color:var(--text);background:var(--surface2)}
.nav-item.active{border-right:3px solid var(--accent)}
.nav-spacer{flex:1}
.nav-item.signout{color:var(--danger)}
.nav-item.signout:hover{background:rgba(239,68,68,.1)}
.main{flex:1;overflow-y:auto}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:1.1rem;font-weight:600}
.content{padding:32px;max-width:900px}
.profile-hero{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:var(--radius);padding:28px;display:flex;align-items:center;gap:24px;margin-bottom:28px}
.avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;border:3px solid var(--accent)}
.hero-info{flex:1}
.hero-name{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.hero-email{font-size:.85rem;color:var(--muted);margin-bottom:10px}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600}
.rank-badge{padding:6px 14px;font-size:.85rem;border-radius:8px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center}
.stat-val{font-size:1.8rem;font-weight:700;margin-bottom:4px}
.stat-lbl{font-size:.78rem;color:var(--muted)}
.section{margin-bottom:28px}
.section-title{font-size:1rem;font-weight:600;margin-bottom:14px}
.xp-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.xp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.xp-rank-name{font-size:1.1rem;font-weight:700}
.xp-count{font-size:.85rem;color:var(--muted)}
.xp-bar{background:var(--surface2);border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px}
.xp-fill{height:100%;border-radius:8px;transition:width .6s}
.xp-labels{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted)}
.rank-ladder{margin-top:20px;display:flex;flex-direction:column;gap:0}
.rank-step{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-step:last-child{border-bottom:none}
.rank-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rank-step-name{font-size:.88rem;font-weight:500;flex:1}
.rank-step-xp{font-size:.78rem;color:var(--muted)}
.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.achievement-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:flex-start;gap:12px}
.achievement-card.earned{border-color:var(--accent);background:rgba(108,99,255,.05)}
.achievement-card.locked{opacity:.5;filter:grayscale(.8)}
.ach-icon{font-size:1.8rem;flex-shrink:0}
.ach-info{flex:1;min-width:0}
.ach-name{font-size:.88rem;font-weight:600;margin-bottom:3px}
.ach-desc{font-size:.75rem;color:var(--muted);line-height:1.4}
.ach-date{font-size:.72rem;color:var(--accent2);margin-top:4px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--muted)}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">⚡ Si Math AI</div>
  <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
  <a href="chat.html" class="nav-item">💬 AI Tutor</a>
  <a href="focus.html" class="nav-item">🎯 Focus Practice</a>
  <a href="mock-exam.html" class="nav-item">📝 Mock Exam</a>
  <a href="weakness.html" class="nav-item">📊 Weakness Analyzer</a>
  <a href="history.html" class="nav-item">📅 History</a>
  <a href="devices.html" class="nav-item">🔒 Devices</a>
  <a href="profile.html" class="nav-item active">👤 Profile</a>
  <a href="pricing.html" class="nav-item">💎 Plans</a>
  <div class="nav-spacer"></div>
  <a href="#" class="nav-item signout" id="signOutBtn">🚪 Sign Out</a>
</nav>
<div class="main">
  <div class="topbar">
    <h1>👤 My Profile</h1>
  </div>
  <div class="content">
    <div id="pageContent"><div class="empty"><div class="spinner"></div><br>Loading profile…</div></div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://igvkyxkmjnkzscqgommj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MTRD_njnCX-1CobeqTIMiw_QhNYarXp';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const RANKS = [
  { name: 'Beginner',      min: 0,    color: '#7a90b2', bg: 'rgba(122,144,178,.15)', icon: '🌱' },
  { name: 'Learner',       min: 100,  color: '#60a5fa', bg: 'rgba(96,165,250,.15)',  icon: '📘' },
  { name: 'Solver',        min: 300,  color: '#a78bfa', bg: 'rgba(167,139,250,.15)', icon: '🔧' },
  { name: 'Scholar',       min: 600,  color: '#4ade80', bg: 'rgba(74,222,128,.15)',  icon: '🎓' },
  { name: 'Expert',        min: 1000, color: '#f59e0b', bg: 'rgba(245,158,11,.15)',  icon: '⭐' },
  { name: 'Master',        min: 1500, color: '#f97316', bg: 'rgba(249,115,22,.15)',  icon: '🏆' },
  { name: 'Elite Scholar', min: 2500, color: '#f59e0b', bg: 'rgba(245,158,11,.2)',   icon: '👑' },
];

const ALL_ACHIEVEMENTS = [
  { key: 'first_question',       icon: '💬', name: 'First Question',       desc: 'Asked your first question to the AI Tutor.' },
  { key: 'first_mock_exam',      icon: '📝', name: 'First Mock Exam',       desc: 'Completed your first mock exam.' },
  { key: 'streak_7',             icon: '🔥', name: '7-Day Streak',          desc: 'Practiced for 7 days in a row.' },
  { key: 'streak_30',            icon: '⚡', name: '30-Day Streak',         desc: 'Practiced for 30 consecutive days.' },
  { key: 'first_mastered_topic', icon: '🎯', name: 'First Mastered Topic',  desc: 'Reached mastery on a topic.' },
  { key: 'questions_100',        icon: '💯', name: '100 Questions Solved',  desc: 'Asked 100 questions to the AI Tutor.' },
  { key: 'consistency_champion', icon: '🏅', name: 'Consistency Champion', desc: 'Maintained a streak of 14+ days.' },
];

function getRankInfo(xp) {
  let rank = RANKS[0];
  for (const r of RANKS) { if (xp >= r.min) rank = r; }
  return rank;
}

function getNextRank(xp) {
  for (const r of RANKS) { if (xp < r.min) return r; }
  return null;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function loadPage() {
  const { data: { user }, error: authErr } = await sb.auth.getUser();
  if (authErr || !user) { window.location.href = 'index.html'; return; }

  const [profileRes, achRes, qRes, examRes, masteryRes] = await Promise.all([
    sb.from('profiles').select('*').eq('id', user.id).single(),
    sb.from('achievements').select('*').eq('user_id', user.id),
    sb.from('question_records').select('id').eq('user_id', user.id),
    sb.from('exam_practice_sessions').select('id').eq('user_id', user.id),
    sb.from('mastery_records').select('topic,mastery_score').eq('user_id', user.id),
  ]);

  const profile = profileRes.data || {};
  const xp = profile.xp || 0;
  const rank = getRankInfo(xp);
  const nextRank = getNextRank(xp);
  const earned = achRes.data || [];

  const totalQuestions = qRes.data?.length || 0;
  const totalExams = examRes.data?.length || 0;
  const masteryRecords = masteryRes.data || [];
  const topicsStudied = masteryRecords.length;
  const masteredTopics = masteryRecords.filter(m => (m.mastery_score || 0) >= 80).length;

  const displayName = profile.full_name || user.email?.split('@')[0] || 'Student';
  const xpInRange = nextRank ? xp - rank.min : xp - rank.min;
  const rangeSize = nextRank ? nextRank.min - rank.min : 1;
  const xpPct = nextRank ? Math.min(100, (xpInRange / rangeSize) * 100) : 100;
  const xpToNext = nextRank ? nextRank.min - xp : 0;

  let html = `
  <div class="profile-hero">
    <div class="avatar" style="background:${rank.bg};border-color:${rank.color}">${rank.icon}</div>
    <div class="hero-info">
      <div class="hero-name">${escHtml(displayName)}</div>
      <div class="hero-email">${escHtml(user.email)}</div>
      <div class="hero-badges">
        <span class="badge rank-badge" style="background:${rank.bg};color:${rank.color}">${rank.icon} ${rank.name}</span>
        <span class="badge" style="background:rgba(108,99,255,.15);color:#a78bfa">⚡ ${xp.toLocaleString()} XP</span>
        ${profile.plan === 'pro'
          ? '<span class="badge" style="background:rgba(251,191,36,.15);color:#fbbf24">⭐ Pro</span>'
          : '<span class="badge" style="background:rgba(139,92,246,.15);color:#a78bfa">🆓 Free</span>'}
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" style="color:#60a5fa">${totalQuestions.toLocaleString()}</div>
      <div class="stat-lbl">Questions Asked</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#f59e0b">${totalExams.toLocaleString()}</div>
      <div class="stat-lbl">Exams Taken</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#a78bfa">${topicsStudied.toLocaleString()}</div>
      <div class="stat-lbl">Topics Studied</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#4ade80">${masteredTopics.toLocaleString()}</div>
      <div class="stat-lbl">Topics Mastered</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">⚡ XP & Rank Progress</div>
    <div class="xp-section">
      <div class="xp-header">
        <span class="xp-rank-name" style="color:${rank.color}">${rank.icon} ${rank.name}</span>
        <span class="xp-count">${xp.toLocaleString()} XP${nextRank ? ` · ${xpToNext} to ${nextRank.name}` : ' · Maximum rank!'}</span>
      </div>
      <div class="xp-bar"><div class="xp-fill" style="width:${xpPct}%;background:${rank.color}"></div></div>
      <div class="xp-labels">
        <span>${rank.min.toLocaleString()} XP</span>
        ${nextRank ? `<span>${nextRank.min.toLocaleString()} XP</span>` : '<span>MAX</span>'}
      </div>
      <div class="rank-ladder">
        ${RANKS.map(r => {
          const isCurrent = r.name === rank.name;
          const isEarned = xp >= r.min;
          return `<div class="rank-step${isCurrent ? ' current' : isEarned ? ' earned' : ''}">
            <div class="rank-dot" style="background:${isEarned ? r.color : 'var(--border)'}"></div>
            <div class="rank-step-name" style="${isCurrent ? `color:${r.color}` : ''}">${r.icon} ${r.name}${isCurrent ? ' <span style="font-size:.72rem;color:var(--accent2)">← You</span>' : ''}</div>
            <div class="rank-step-xp">${r.min.toLocaleString()} XP</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🏆 Achievements (${earned.length} / ${ALL_ACHIEVEMENTS.length})</div>
    <div class="achievements-grid">
      ${ALL_ACHIEVEMENTS.map(a => {
        const e = earned.find(x => x.achievement_key === a.key);
        return `<div class="achievement-card ${e ? 'earned' : 'locked'}">
          <div class="ach-icon">${e ? a.icon : '🔒'}</div>
          <div class="ach-info">
            <div class="ach-name">${a.name}</div>
            <div class="ach-desc">${a.desc}</div>
            ${e ? `<div class="ach-date">Earned ${fmtDate(e.earned_at)}</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  document.getElementById('pageContent').innerHTML = html;
}

document.getElementById('signOutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await sb.auth.signOut();
  window.location.href = 'index.html';
});

loadPage();
</script>
</body>
</html>
