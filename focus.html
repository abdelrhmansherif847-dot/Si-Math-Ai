<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Si Math AI — Focus Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050a14;--bg-elev-1:#0a1224;--bg-elev-2:#0e1830;--bg-card:#0c1428;--bg-card-hi:#101a32;
  --cyan:#38bdf8;--cyan-2:#0ea5e9;--cyan-3:#7dd3fc;
  --cyan-bg-soft:rgba(56,189,248,.1);--cyan-bg-med:rgba(56,189,248,.16);
  --cyan-border:rgba(56,189,248,.28);--cyan-border-soft:rgba(56,189,248,.14);
  --green:#22c55e;--green-soft:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.32);
  --amber:#f5b942;--amber-soft:rgba(245,185,66,.12);--amber-border:rgba(245,185,66,.32);
  --red:#ef4f5f;--red-soft:rgba(239,79,95,.12);--red-border:rgba(239,79,95,.32);
  --text-100:#fff;--text-200:#dde8f7;--text-300:#a8bcd9;--text-400:#7a90b2;--text-500:#536b8c;
  --border-soft:#1a2540;--border-mid:#26334d;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-7:32px;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:24px;
  --font-display:'Manrope',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --nav-h:58px;--side-w:262px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{background-color:#050a14 !important;background:#050a14 !important;color:var(--text-200);font-family:var(--font-body);font-size:15px;line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;position:relative}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb-1{width:380px;height:380px;background:radial-gradient(circle,rgba(56,189,248,.12),transparent 70%);top:-120px;right:-120px}
.orb-2{width:280px;height:280px;background:radial-gradient(circle,rgba(14,165,233,.08),transparent 70%);bottom:-60px;left:-100px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:60;height:calc(var(--nav-h) + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;gap:var(--space-3);padding-left:16px;padding-right:16px;background:rgba(5,10,20,.97);border-bottom:1px solid var(--border-soft)}
.hamb{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;color:var(--text-200)}
.hamb svg{width:18px;height:18px}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:17px;color:#fff}
.logo-mark{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--cyan-border);box-shadow:0 0 16px rgba(56,189,248,.22);overflow:hidden}
.logo-mark img{width:96%;height:96%;object-fit:contain;display:block}
.brand .mid{color:var(--cyan)}.brand .ai{color:var(--text-300);font-weight:700}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.back-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:11px;background:var(--bg-card);border:1px solid var(--cyan-border);color:#fff;font-weight:600;font-size:13.5px;transition:all .2s}
.back-btn:hover{background:var(--cyan-bg-soft);border-color:var(--cyan);transform:translateY(-1px)}
.back-btn svg{width:15px;height:15px}
.back-btn .lbl-full{display:none}
@media(min-width:560px){.back-btn .lbl-full{display:inline}.back-btn .lbl-short{display:none}}

/* SIDEBAR */
.sidebar{position:fixed;z-index:70;top:0;bottom:0;left:0;width:var(--side-w);background:var(--bg-elev-1);border-right:1px solid var(--border-soft);padding:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 14px) 14px 18px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;transform:translateX(-100%);transition:transform .32s cubic-bezier(.5,.1,.25,1)}
.sidebar.open{transform:translateX(0)}
.side-brand{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:16px;color:#fff;padding:0 6px 12px}
.side-sec{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-500);margin:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:var(--text-300);font-weight:500;font-size:14.5px;position:relative;border:1px solid transparent;transition:all .2s}
.nav-item svg{width:18px;height:18px;flex-shrink:0;color:var(--text-400);transition:color .2s}
.nav-item:hover{background:var(--bg-card);color:var(--text-100)}
.nav-item:hover svg{color:var(--cyan)}
.nav-item.active{background:var(--cyan-bg-soft);color:#fff;border-color:var(--cyan-border-soft);box-shadow:inset 0 0 18px rgba(56,189,248,.08)}
.nav-item.active svg{color:var(--cyan)}
.nav-item.active::before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 4px 4px 0;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.overlay{position:fixed;inset:0;z-index:65;background:rgba(2,6,14,.66);opacity:0;visibility:hidden;transition:opacity .3s}
.overlay.show{opacity:1;visibility:visible}

/* MAIN */
.main{position:relative;z-index:10;padding:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 20px) 16px calc(40px + env(safe-area-inset-bottom,0px));max-width:1200px;margin:0 auto}
.page-head{margin-bottom:var(--space-6);animation:rise .6s ease both}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px;display:inline-flex;align-items:center;gap:8px}
.eyebrow .live-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
.page-head h1{font-family:var(--font-display);font-weight:800;font-size:clamp(26px,7vw,36px);line-height:1.08;letter-spacing:-.02em;color:#fff}
.page-head p{color:var(--text-300);font-size:15px;margin-top:8px;max-width:560px}
.sec-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-500);margin:var(--space-7) 4px var(--space-4);display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border-soft)}

/* weekly progress + task tracking */
.wp-progress{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border-soft)}
.wp-progress .wpp-ring{font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--cyan);flex-shrink:0}
.wp-progress .wpp-body{flex:1;min-width:0}
.wp-progress .wpp-top{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-300);margin-bottom:7px}
.wp-progress .wpp-top b{color:#fff;font-family:var(--font-display)}
.wp-progress .wpp-track{height:9px;background:var(--bg-elev-1);border:1px solid var(--border-soft);border-radius:100px;overflow:hidden}
.wp-progress .wpp-track i{display:block;height:100%;border-radius:100px;background:linear-gradient(90deg,var(--cyan-2),var(--cyan));box-shadow:0 0 10px rgba(56,189,248,.45);width:0;transition:width 1.2s cubic-bezier(.25,.46,.45,.94)}
.wp-check{width:26px;height:26px;flex-shrink:0;border-radius:8px;border:2px solid var(--border-mid);background:var(--bg-elev-1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:transparent}
.wp-check svg{width:14px;height:14px}
.wp-check.done{background:var(--green);border-color:var(--green);color:#031020}
.wp-est{font-family:var(--font-mono);font-size:10.5px;color:var(--text-500);margin-left:auto;flex-shrink:0;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.wp-est svg{width:11px;height:11px}
.wp-day.completed .wp-task{opacity:.55;text-decoration:line-through}
.ri-rank{margin-left:auto;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:100px;flex-shrink:0}
.ri-rank.official{background:var(--green-soft);border:1px solid var(--green-border);color:var(--green)}
.ri-rank.si{background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft);color:var(--cyan)}
.ri-rank.ext{background:var(--bg-elev-1);border:1px solid var(--border-mid);color:var(--text-400)}
.res-item{display:flex;align-items:center;gap:10px}

/* dynamic plan context */
.plan-context{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border-soft)}
.pc-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10.5px;padding:5px 11px;border-radius:100px;background:var(--bg-elev-1);border:1px solid var(--border-mid);color:var(--text-300)}
.pc-chip svg{width:12px;height:12px;color:var(--cyan)}
.pc-chip b{color:#fff;font-weight:600}

/* practice mode toast/modal */
.fx-toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom,0px));transform:translateX(-50%) translateY(20px);z-index:120;display:flex;align-items:center;gap:12px;max-width:90vw;padding:14px 18px;border-radius:14px;background:var(--bg-elev-2);border:1px solid var(--cyan-border);box-shadow:0 14px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:all .3s}
.fx-toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.fx-toast .ft-ic{width:36px;height:36px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border)}
.fx-toast .ft-t{font-family:var(--font-display);font-weight:700;font-size:14px;color:#fff}
.fx-toast .ft-s{font-size:12px;color:var(--text-300);margin-top:1px}

.card{position:relative;overflow:hidden;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:var(--space-5);transition:transform .3s cubic-bezier(.25,.46,.45,.94),border-color .3s,box-shadow .3s;animation:rise .6s ease both}
@media(min-width:768px){.card{padding:var(--space-6)}}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 0% 0%,rgba(56,189,248,.06),transparent 55%);opacity:0;transition:opacity .3s;pointer-events:none}
.card:hover{transform:translateY(-3px);border-color:var(--cyan-border);box-shadow:0 16px 40px rgba(0,0,0,.45)}
.card:hover::before{opacity:1}
.card-head{display:flex;align-items:center;gap:11px;margin-bottom:var(--space-5)}
.card-ico{width:42px;height:42px;flex-shrink:0;border-radius:12px;font-size:19px;display:flex;align-items:center;justify-content:center;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border);box-shadow:0 0 14px rgba(56,189,248,.12)}
.card-title{font-family:var(--font-display);font-weight:700;font-size:17px;color:#fff;line-height:1.1}
.card-sub{font-size:12.5px;color:var(--text-400);margin-top:2px}

/* SECTION 1: AI STUDY PRESCRIPTION */
.rx{position:relative;overflow:hidden;border:1px solid var(--cyan-border);background:linear-gradient(135deg,rgba(56,189,248,.12),var(--bg-card));border-radius:var(--r-lg);padding:var(--space-6);animation:rise .6s ease both}
.rx::before{content:'';position:absolute;top:-50px;right:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,.2),transparent 70%);pointer-events:none}
.rx-top{display:flex;align-items:center;gap:13px;margin-bottom:20px}
.rx-ic{width:46px;height:46px;flex-shrink:0;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border);box-shadow:0 0 16px rgba(56,189,248,.25)}
.rx-top .l{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan)}
.rx-top .t{font-family:var(--font-display);font-weight:800;font-size:26px;color:#fff;margin-top:3px}
.rx-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(min-width:620px){.rx-stats{grid-template-columns:repeat(4,1fr)}}
.rx-stat{padding:13px;border-radius:var(--r-md);background:var(--bg-elev-1);border:1px solid var(--border-soft)}
.rx-stat .l{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-400)}
.rx-stat .v{font-family:var(--font-display);font-weight:800;font-size:20px;margin-top:6px;color:#fff}
.rx-stat .v.cur{color:var(--red)}.rx-stat .v.tgt{color:var(--green)}.rx-stat .v.gain{color:var(--cyan)}.rx-stat .v.time{color:var(--amber)}
.rx-order .ro-h{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-400);margin-bottom:12px}
.rx-order .ro-steps{display:flex;flex-wrap:wrap;gap:9px}
.ro-step{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:100px;background:var(--bg-elev-1);border:1px solid var(--cyan-border-soft);font-size:13px;color:var(--text-200)}
.ro-step .rn{width:20px;height:20px;flex-shrink:0;border-radius:50%;background:var(--cyan);color:#031020;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:11px}

/* SECTION 2: RESOURCES */
.res-topic{margin-bottom:var(--space-4)}
.res-topic .rt-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.res-topic .rt-no{width:34px;height:34px;flex-shrink:0;border-radius:10px;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:14px;color:var(--cyan)}
.res-topic .rt-name{font-family:var(--font-display);font-weight:700;font-size:17px;color:#fff}
.res-topic .rt-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px}
.rt-tag{font-family:var(--font-mono);font-size:10px;color:var(--text-400);display:inline-flex;align-items:center;gap:5px}
.rt-tag .pri-dot{width:6px;height:6px;border-radius:50%}
.rt-tag .pri-dot.high{background:var(--red);box-shadow:0 0 6px var(--red)}
.rt-tag .pri-dot.med{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.res-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.res-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--r-md);background:var(--bg-elev-1);border:1px solid var(--border-soft);transition:all .2s}
.res-item:hover{border-color:var(--cyan-border-soft);transform:translateX(3px)}
.res-item .ri-ic{width:28px;height:28px;flex-shrink:0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft)}
.res-item .ri-name{flex:1;min-width:0;font-size:13.5px;color:var(--text-200);font-weight:500}
.res-btns{display:flex;gap:9px;flex-wrap:wrap}
.res-btn{flex:1;min-width:130px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:var(--r-md);font-weight:600;font-size:13.5px;transition:all .2s}
.res-btn.open{background:var(--bg-elev-1);border:1px solid var(--border-mid);color:var(--text-200)}
.res-btn.open:hover{border-color:var(--cyan-border);color:#fff;transform:translateY(-2px)}
.res-btn.start{background:var(--cyan);border:none;color:#031020;box-shadow:0 6px 18px rgba(56,189,248,.26)}
.res-btn.start:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(56,189,248,.4)}
.res-btn svg{width:15px;height:15px}

/* SECTION 3: WEEKLY PLAN */
.week-plan{display:flex;flex-direction:column;gap:9px}
.wp-day{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r-md);background:var(--bg-card);border:1px solid var(--border-soft);transition:all .2s}
.wp-day:hover{border-color:var(--cyan-border);transform:translateX(3px)}
.wp-day.today{border-color:var(--cyan-border);background:linear-gradient(135deg,var(--cyan-bg-soft),var(--bg-card))}
.wp-day.rest{opacity:.85}
.wp-name{width:92px;flex-shrink:0;font-family:var(--font-display);font-weight:700;font-size:14px;color:#fff;display:flex;flex-direction:column;gap:2px}
.wp-name small{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);font-weight:500}
.wp-task{flex:1;min-width:0;display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text-200)}
.wp-task .wt-ic{width:30px;height:30px;flex-shrink:0;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--bg-elev-1);border:1px solid var(--border-mid)}
.wp-day.task .wt-ic{background:var(--cyan-bg-soft);border-color:var(--cyan-border-soft)}
.wp-day.review .wt-ic{background:var(--amber-soft);border-color:var(--amber-border)}
.wp-day.test .wt-ic{background:var(--green-soft);border-color:var(--green-border)}

/* SECTION 4: ROADMAP */
.roadmap{display:flex;flex-direction:column;gap:0;position:relative}
.rm-week{display:flex;gap:15px;position:relative;padding-bottom:22px}
.rm-week:last-child{padding-bottom:0}
.rm-line{position:absolute;left:19px;top:40px;bottom:0;width:2px;background:linear-gradient(180deg,var(--cyan-border),var(--border-soft));z-index:0}
.rm-week:last-child .rm-line{display:none}
.rm-dot{width:40px;height:40px;flex-shrink:0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:12px;position:relative;z-index:1;background:var(--bg-elev-1);border:1px solid var(--cyan-border);color:var(--cyan);box-shadow:0 0 14px rgba(56,189,248,.18)}
.rm-week.active .rm-dot{background:var(--cyan);color:#031020;box-shadow:0 0 18px rgba(56,189,248,.5)}
.rm-body{flex:1;min-width:0;padding-top:2px}
.rm-wk{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-500)}
.rm-topic{font-family:var(--font-display);font-weight:700;font-size:16px;color:#fff;margin-top:2px}
.rm-desc{font-size:12.5px;color:var(--text-400);margin-top:3px}

/* SECTION 5: MILESTONES */
.miles{display:flex;align-items:center;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.miles::-webkit-scrollbar{display:none}
.mile{flex:1;min-width:78px;text-align:center;padding:16px 8px;border-radius:var(--r-md);background:var(--bg-elev-1);border:1px solid var(--border-soft);position:relative}
.mile.now{border-color:var(--red-border);background:linear-gradient(135deg,var(--red-soft),var(--bg-elev-1))}
.mile.goal{border-color:var(--green-border);background:linear-gradient(135deg,var(--green-soft),var(--bg-elev-1))}
.mile .ml{font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-500)}
.mile .mv{font-family:var(--font-display);font-weight:800;font-size:22px;margin-top:6px;color:#fff}
.mile.now .mv{color:var(--red)}.mile.goal .mv{color:var(--green)}
.mile-arrow{flex-shrink:0;color:var(--text-500);display:flex;align-items:center}
.mile-arrow svg{width:16px;height:16px}

/* SECTION 6: AI REC */
.airec{display:flex;gap:13px;align-items:flex-start;border:1px solid var(--cyan-border-soft);background:linear-gradient(135deg,var(--bg-card-hi),var(--bg-card));border-radius:var(--r-lg);padding:var(--space-5);animation:rise .6s ease both}
.airec .ai-av{width:48px;height:48px;flex-shrink:0;border-radius:13px;background:#fff;border:1px solid var(--cyan-border);box-shadow:0 0 14px rgba(56,189,248,.22);overflow:hidden;display:flex;align-items:center;justify-content:center}
.airec .ai-av img{width:100%;height:100%;object-fit:cover}
.airec .ai-body{flex:1;min-width:0}
.airec .ai-body .al{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:6px}
.airec .ai-body p{color:var(--text-200);font-size:14px;line-height:1.55}
.airec .ai-body p b{color:#fff;font-weight:700}
.airec .ai-result{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-soft)}
.airec .ai-result .arr{font-family:var(--font-mono);font-size:11px;color:var(--text-400)}
.airec .ai-result .arr b{font-family:var(--font-display);font-size:15px;display:block;margin-top:3px}
.airec .ai-result .arr.r1 b{color:var(--cyan)}
.airec .ai-result .arr.r2 b{color:var(--green)}

/* task 3-state toggle */
.task-toggle{width:26px;height:26px;flex-shrink:0;border-radius:8px;border:2px solid var(--border-mid);background:var(--bg-elev-1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:transparent;font-size:13px;font-weight:700;user-select:none}
.task-toggle.inprogress{background:var(--amber);border-color:var(--amber);color:#031020}
.task-toggle.done{background:var(--green);border-color:var(--green);color:#031020}
/* action cards */
.act-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:24px}
.act-card{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border-radius:var(--r-md);background:var(--bg-card);border:1px solid var(--border-soft)}
.act-ic{width:34px;height:34px;flex-shrink:0;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft)}
.act-body{flex:1;min-width:0}
.act-title{font-family:var(--font-display);font-weight:700;font-size:13.5px;color:#fff;margin-bottom:3px}
.act-desc{font-size:12.5px;color:var(--text-300);line-height:1.5}
/* time estimate banner */
.time-banner{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--cyan-bg-soft),var(--bg-card));border:1px solid var(--cyan-border-soft);margin-bottom:24px}
.tb-val{font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--cyan);line-height:1;flex-shrink:0}
.tb-body{flex:1;min-width:0}
.tb-label{font-size:12px;color:var(--text-400);margin-bottom:2px}
.tb-detail{font-size:13px;color:var(--text-200)}
/* CTA BAR */
.cta-bar{display:flex;flex-direction:column;gap:12px;margin-top:var(--space-7)}
@media(min-width:560px){.cta-bar{flex-direction:row}}
.cta-primary{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:17px;border-radius:var(--r-md);border:none;background:linear-gradient(135deg,var(--cyan-2),var(--cyan));color:#031020;font-family:var(--font-display);font-weight:800;font-size:16px;box-shadow:0 8px 28px rgba(56,189,248,.3);transition:transform .2s,box-shadow .2s}
.cta-primary:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(56,189,248,.46)}
.cta-primary svg{width:18px;height:18px}
.cta-secondary{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:17px;border-radius:var(--r-md);background:var(--bg-card);border:1px solid var(--cyan-border);color:#fff;font-weight:600;font-size:15px;transition:all .2s}
.cta-secondary:hover{background:var(--cyan-bg-soft);border-color:var(--cyan);transform:translateY(-2px)}
.cta-secondary svg{width:16px;height:16px;color:var(--cyan);transition:transform .5s}
.cta-secondary.spin svg{transform:rotate(360deg)}

@media(min-width:1024px){
  .hamb{display:none}.sidebar{transform:translateX(0)}.overlay{display:none!important}
  .main{padding-left:calc(var(--side-w) + 28px);padding-right:28px;max-width:1360px}
  .topbar{padding-left:calc(var(--side-w) + 28px)}.brand.in-topbar{display:none}
}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(1.4)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 18px rgba(56,189,248,.14)}50%{box-shadow:0 0 26px rgba(56,189,248,.3)}}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}

/* PAGE LOADING */
.page-loading{display:flex;align-items:center;gap:10px;padding:80px 20px;color:var(--text-400);justify-content:center;font-size:14px}
.ld-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:pulse 1.2s infinite;flex-shrink:0}

/* MISSION CARD */
.mission-card{position:relative;overflow:hidden;border:1px solid var(--cyan-border);background:linear-gradient(135deg,rgba(56,189,248,.13),var(--bg-card));border-radius:var(--r-xl);padding:var(--space-6);margin-bottom:24px;animation:rise .5s ease both}
.mission-card::before{content:'';position:absolute;top:-60px;right:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,.18),transparent 70%);pointer-events:none}
.mission-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.mission-ic{width:50px;height:50px;flex-shrink:0;border-radius:14px;background:rgba(56,189,248,.18);border:1px solid var(--cyan-border);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 18px rgba(56,189,248,.3)}
.mission-meta{flex:1;min-width:0}
.mission-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin-bottom:4px}
.mission-title{font-family:var(--font-display);font-weight:800;font-size:clamp(20px,5vw,26px);color:#fff;line-height:1.1}
.mission-sub{font-size:13px;color:var(--text-400);margin-top:4px}
.mission-tasks{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.mission-task{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r-md);background:rgba(255,255,255,.04);border:1px solid var(--border-soft);transition:border-color .2s}
.mission-task:hover{border-color:var(--cyan-border-soft)}
.mt-check{width:24px;height:24px;flex-shrink:0;border-radius:7px;border:2px solid var(--border-mid);background:var(--bg-elev-1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:transparent;font-size:12px;font-weight:700;user-select:none}
.mt-check.inprogress{background:var(--amber);border-color:var(--amber);color:#031020}
.mt-check.done{background:var(--green);border-color:var(--green);color:#031020}
.mt-body{flex:1;min-width:0}
.mt-title{font-size:14px;font-weight:600;color:var(--text-100);transition:all .2s}
.mt-title.done{text-decoration:line-through;opacity:.45}
.mt-type{font-family:var(--font-mono);font-size:10px;color:var(--text-500);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.mt-time{font-family:var(--font-mono);font-size:11px;color:var(--text-400);flex-shrink:0}
.mission-footer{display:flex;align-items:center;gap:14px;padding-top:16px;border-top:1px solid var(--border-soft);flex-wrap:wrap;gap:10px}
.mission-est{font-size:13px;color:var(--text-400)}
.mission-est b{color:var(--cyan-3);font-family:var(--font-display)}
.mission-cta{margin-left:auto;display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:var(--r-md);border:none;background:linear-gradient(135deg,var(--cyan-2),var(--cyan));color:#031020;font-family:var(--font-display);font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 6px 20px rgba(56,189,248,.3);transition:transform .2s,box-shadow .2s;text-decoration:none;white-space:nowrap}
.mission-cta:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(56,189,248,.45)}
.mission-cta svg{width:15px;height:15px}

/* WEEK TRACKER */
.week-tracker{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:var(--space-5);margin-bottom:24px;animation:rise .55s ease both}
.wt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.wt-title{font-family:var(--font-display);font-weight:700;font-size:16px;color:#fff}
.wt-badge{font-family:var(--font-mono);font-size:10.5px;padding:4px 10px;border-radius:100px;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft);color:var(--cyan)}
.wt-rows{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.wt-row{display:grid;grid-template-columns:90px 1fr 72px;align-items:center;gap:10px}
.wr-lbl{font-size:12.5px;color:var(--text-400)}
.wr-track{height:7px;background:var(--bg-elev-1);border-radius:100px;overflow:hidden;border:1px solid var(--border-soft)}
.wr-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(.25,.46,.45,.94)}
.wr-fill.q{background:linear-gradient(90deg,var(--cyan-2),var(--cyan));box-shadow:0 0 8px rgba(56,189,248,.4)}
.wr-fill.s{background:linear-gradient(90deg,#8b5cf6,#a78bfa);box-shadow:0 0 8px rgba(139,92,246,.4)}
.wr-val{font-family:var(--font-mono);font-size:11px;color:var(--text-300);text-align:right;white-space:nowrap}
.wt-mastery{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r-md);background:var(--bg-elev-1);border:1px solid var(--border-soft)}
.wm-now{flex-shrink:0;text-align:center}
.wm-label{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-500);margin-bottom:3px}
.wm-val{font-family:var(--font-display);font-weight:800;font-size:20px;line-height:1}
.wm-arrow{color:var(--text-500);font-size:18px;flex-shrink:0}
.wm-track{flex:1;height:8px;background:var(--border-soft);border-radius:100px;overflow:hidden;position:relative}
.wm-fill{height:100%;border-radius:100px;background:var(--green);transition:width 1s ease}

/* COVERAGE MAP */
.coverage-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:var(--space-5);margin-bottom:24px;animation:rise .6s ease both}
.cov-intro{font-size:13px;color:var(--text-400);margin-bottom:16px;line-height:1.5}
.cov-subtopics{display:flex;flex-direction:column;gap:7px}
.cov-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--bg-elev-1);border:1px solid var(--border-soft);transition:border-color .2s;cursor:pointer;text-decoration:none}
.cov-row:hover{border-color:var(--cyan-border-soft)}
.cr-check{width:20px;height:20px;flex-shrink:0;border-radius:6px;border:1.5px solid var(--border-mid);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;color:transparent}
.cov-row.practiced .cr-check{background:var(--cyan-bg-soft);border-color:var(--cyan-border);color:var(--cyan)}
.cr-name{flex:1;min-width:0;font-size:13px;color:var(--text-300);font-weight:500}
.cov-row.practiced .cr-name{color:#fff}
.cr-bar-wrap{width:56px;height:5px;background:var(--bg-card);border-radius:100px;overflow:hidden}
.cr-bar{height:100%;border-radius:100px;background:var(--cyan);transition:width .8s ease}
.cr-count{font-family:var(--font-mono);font-size:10.5px;color:var(--text-500);flex-shrink:0;width:38px;text-align:right}

/* DAY CARDS */
.day-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.day-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);overflow:hidden;transition:border-color .3s;animation:rise .65s ease both}
.day-card.active{border-color:var(--cyan-border)}
.day-card-head{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;user-select:none;transition:background .2s}
.day-card-head:hover{background:rgba(255,255,255,.02)}
.dc-num{width:38px;height:38px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:14px;border:1px solid var(--border-mid);background:var(--bg-elev-1);color:var(--text-400);transition:all .3s}
.day-card.active .dc-num{background:rgba(56,189,248,.18);border-color:var(--cyan-border);color:var(--cyan)}
.day-card.done-all .dc-num{background:rgba(34,197,94,.12);border-color:var(--green-border);color:var(--green)}
.dc-meta{flex:1;min-width:0}
.dc-title{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--text-300);transition:color .3s}
.day-card.active .dc-title{color:#fff}
.dc-sub{font-size:12px;color:var(--text-500);margin-top:2px;transition:color .3s}
.day-card.active .dc-sub{color:var(--text-400)}
.dc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dc-badge{font-family:var(--font-mono);font-size:10px;padding:3px 9px;border-radius:100px;white-space:nowrap}
.dc-badge.today{background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft);color:var(--cyan)}
.dc-badge.done{background:var(--green-soft);border:1px solid var(--green-border);color:var(--green)}
.dc-badge.locked{background:var(--bg-elev-1);border:1px solid var(--border-soft);color:var(--text-500)}
.dc-chev{color:var(--text-500);transition:transform .3s;font-size:14px;line-height:1}
.day-card.open .dc-chev{transform:rotate(180deg)}
.day-body{display:none;padding:0 18px 16px;flex-direction:column;gap:8px}
.day-card.open .day-body{display:flex}
.day-task{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--r-md);background:var(--bg-elev-1);border:1px solid var(--border-soft)}
.dt-ic{width:32px;height:32px;flex-shrink:0;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px}
.dt-ic.learn{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3)}
.dt-ic.practice{background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft)}
.dt-ic.review{background:var(--amber-soft);border:1px solid var(--amber-border)}
.dt-ic.ask_zero{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.28)}
.dt-ic.drill{background:var(--red-soft);border:1px solid var(--red-border)}
.dt-meta{flex:1;min-width:0}
.dt-title{font-size:13.5px;font-weight:600;color:var(--text-200)}
.dt-type{font-family:var(--font-mono);font-size:10px;color:var(--text-500);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.dt-time{font-family:var(--font-mono);font-size:11px;color:var(--text-400);flex-shrink:0}
.day-check{width:24px;height:24px;flex-shrink:0;border-radius:7px;border:2px solid var(--border-mid);background:var(--bg-elev-2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:transparent;font-size:12px;font-weight:700;user-select:none}
.day-check.inprogress{background:var(--amber);border-color:var(--amber);color:#031020}
.day-check.done{background:var(--green);border-color:var(--green);color:#031020}

/* MASTERY CARD */
.mastery-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:var(--space-5);margin-bottom:24px;animation:rise .7s ease both}
.mc-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.mc-stat{text-align:center;padding:12px 14px;border-radius:var(--r-md);background:var(--bg-elev-1);border:1px solid var(--border-soft);min-width:68px;flex:1}
.ms-l{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-500);margin-bottom:4px}
.ms-v{font-family:var(--font-display);font-weight:800;font-size:20px;line-height:1}
.mc-bar-wrap{margin-bottom:14px}
.mc-bar-track{height:10px;background:var(--bg-elev-1);border-radius:100px;overflow:hidden;border:1px solid var(--border-soft);margin-bottom:8px}
.mc-bar-fill{height:100%;border-radius:100px;transition:width .9s cubic-bezier(.25,.46,.45,.94)}
.mc-cps{display:flex;justify-content:space-between}
.mc-cp{font-family:var(--font-mono);font-size:10px;color:var(--text-500)}
.mc-cp.hit{color:var(--green)}
.mc-trend{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-300);padding:10px 14px;border-radius:var(--r-md);background:var(--bg-elev-1);border:1px solid var(--border-soft)}
.mc-trend b{color:#fff}
</style>

// ===== CONCEPT NORMALIZER =====
const CONCEPT_CANON = {
  'isolation of variable':'Isolating Variables','isolating variable':'Isolating Variables',
  'isolation of variables':'Isolating Variables','isolating a variable':'Isolating Variables',
  'isolate variable':'Isolating Variables','isolate variables':'Isolating Variables',
  'linear equation':'Linear Equations','linear equations':'Linear Equations',
  'inverse operation':'Inverse Operations','inverse operations':'Inverse Operations',
  'solving for variable':'Solving for Variables','solving for variables':'Solving for Variables',
  'solving for x':'Solving for Variables','solve for x':'Solving for Variables',
  'quadratic equation':'Quadratic Equations','quadratic equations':'Quadratic Equations',
  'systems of equation':'Systems of Equations','system of equations':'Systems of Equations',
  'slope intercept form':'Slope-Intercept Form','slope-intercept':'Slope-Intercept Form',
  'slope intercept':'Slope-Intercept Form',
  'order of operation':'Order of Operations','order of operations':'Order of Operations',
  'substitution method':'Substitution Method','elimination method':'Elimination Method',
  'distributive property':'Distributive Property','combining like terms':'Combining Like Terms',
  'combining like term':'Combining Like Terms',
};
function normalizeConcept(c) {
  if (!c) return null;
  const t = c.trim();
  const key = t.toLowerCase();
  if (CONCEPT_CANON[key]) return CONCEPT_CANON[key];
  return t.replace(/\b\w/g, ch => ch.toUpperCase());
}
function dedupeConceptList(arr) {
  const seen = new Set();
  const out = [];
  for (const c of arr) {
    const n = normalizeConcept(c);
    if (!n) continue;
    const k = n.toLowerCase();
    if (!seen.has(k)) { seen.add(k); out.push(n); }
  }
  return out;
}

// ===== computeTopicProfile =====
const DAY = 86400000;
function computeTopicProfile(entry) {
  const now = Date.now();
  const times = entry.records.map(t => new Date(t).getTime());
  const total = times.length;
  if (total < 2) return null;
  const last7  = times.filter(t => now - t < 7  * DAY).length;
  const last14 = times.filter(t => now - t < 14 * DAY).length;
  const prev7  = times.filter(t => now - t >= 7 * DAY && now - t < 14 * DAY).length;
  let decayScore = 0;
  times.forEach(t => { decayScore += Math.exp(-(now - t) / (DAY * 14)); });
  const weakSignals = entry.weakSignals  || 0;
  const helpReqs    = entry.helpRequests || 0;
  const explReqs    = entry.explRequests || 0;
  const repeated    = entry.repeated     || 0;
  const confAfterArr = (entry.confAfterArr || []).filter(c => c != null && c > 0);
  const avgConf      = confAfterArr.length > 0
    ? confAfterArr.reduce((a, b) => a + b, 0) / confAfterArr.length : null;
  const highConfCount = confAfterArr.filter(c => c >= 4).length;
  const examMistakes  = entry.examMistakes || 0;
  let mastery;
  if (entry.masteryScore !== null && entry.masteryScore !== undefined) {
    mastery = Math.round(Number(entry.masteryScore));
  } else {
    const chatWeaknessScore = (weakSignals * 3) + (helpReqs * 2) + (explReqs * 1.5) + (repeated * 2);
    const baseScore = (total * 1.5) + (decayScore * 3) + (last7 * 2) + (examMistakes * 3);
    const positiveBoost = highConfCount * 4;
    mastery = Math.max(10, Math.min(95,
      Math.round(100 - (baseScore + chatWeaknessScore) * 4 + positiveBoost)
    ));
  }
  let priority, priorityClass;
  if (mastery < 30)      { priority = 'Critical'; priorityClass = 'critical'; }
  else if (mastery < 50) { priority = 'High';     priorityClass = 'high';     }
  else if (mastery < 70) { priority = 'Medium';   priorityClass = 'med';      }
  else                   { priority = 'Low';       priorityClass = 'low';      }
  let trend, trendIcon;
  if (last7 > prev7 + 1)               { trend = 'Declining'; trendIcon = '📉'; }
  else if (prev7 > last7 && total >= 3) { trend = 'Improving'; trendIcon = '📈'; }
  else                                  { trend = 'Stable';    trendIcon = '➖'; }
  const concepts = dedupeConceptList([...entry.concepts]);
  const whyBullets = [];
  whyBullets.push(`You asked about this topic ${total} time${total > 1 ? 's' : ''}`);
  if (last14 > 0)        whyBullets.push(`${last14} question${last14 > 1 ? 's' : ''} in the last 14 days`);
  if (weakSignals > 0)   whyBullets.push(`${weakSignals} question${weakSignals > 1 ? 's' : ''} flagged as a weak signal`);
  if (helpReqs > 0)      whyBullets.push(`You requested help ${helpReqs} time${helpReqs > 1 ? 's' : ''} on this topic`);
  if (examMistakes > 0)  whyBullets.push(`${examMistakes} mistake${examMistakes > 1 ? 's' : ''} on mock exam questions`);
  if (last7 >= 2)        whyBullets.push('Still actively coming up in your recent sessions');
  if (prev7 > 0 && last7 > prev7) whyBullets.push('Questions are increasing — not yet resolved');
  if (concepts.length > 0) whyBullets.push(`Related concepts: ${concepts.slice(0, 3).join(', ')}`);
  const strengthBullets = [];
  if (total >= 3)                       strengthBullets.push(`Seen across ${total} sessions`);
  if (avgConf !== null && avgConf >= 4) strengthBullets.push(`Average confidence: ${avgConf.toFixed(1)} / 5`);
  if (highConfCount >= 2)               strengthBullets.push(`High confidence on ${highConfCount} occasion${highConfCount > 1 ? 's' : ''}`);
  if (examMistakes === 0 && total >= 3) strengthBullets.push('No mock exam mistakes on this topic');
  if (weakSignals === 0 && total >= 3)  strengthBullets.push('No weakness signals detected');
  if (last14 === 0 && total >= 2)       strengthBullets.push('No longer appearing in recent sessions');
  if (concepts.length > 0)             strengthBullets.push(`Concepts practiced: ${concepts.slice(0, 3).join(', ')}`);
  const mastered         = mastery >= 90 && total >= 4 && examMistakes === 0;
  const strength         = mastery >= 75 && total >= 3 && !mastered;
  const recentlyMastered = !strength && !mastered && mastery >= 70 && total >= 2 && last14 === 0;
  return {
    topic: entry.topic, sub: entry.sub, mastery,
    priority, priorityClass, trend, trendIcon,
    whyBullets, strengthBullets,
    total, last7, last14, avgConf, confAfterArr, examMistakes, weakSignals, helpReqs,
    strength, mastered, recentlyMastered, concepts, decayScore
  };
}

// ===== QUESTION TARGET PER DAY =====
function computeQTarget(mastery, topic, examType) {
  const freq = EXAM_FREQ[(topic||'').toLowerCase()] || 0.6;
  const weakness = (100 - mastery) / 100;
  const priority = weakness * 0.6 + freq * 0.4;
  if (priority >= 0.72) return 80;
  if (priority >= 0.52) return 50;
  if (priority >= 0.32) return 30;
  return 15;
}

function generateAllDayTasks(sub, topic, mastery, qTarget) {
  const easy  = Math.max(5, Math.round(qTarget * 0.45));

// ===== TASK DAY GROUPING =====
function groupTasksByDay(tasks) {
  var g = {1:[],2:[],3:[]};
  tasks.forEach(function(t) {
    var p = t.priority || 1;
    var d = p <= 3 ? 1 : p <= 6 ? 2 : 3;
    g[d].push(t);
  });
  return g;
}
function getCurrentDay(groups) {
  for (var d = 1; d <= 3; d++) {
    var ts = groups[d] || [];
    if (ts.length === 0 || ts.some(function(t){ return (t.status||'NOT_STARTED') !== 'DONE'; })) return d;
  }
  return 3;
}

// ===== WEEKLY STATS =====
function computeWeeklyStats(allRecords, qTarget, profile) {
  var now = new Date();
  var day = now.getDay();
  var daysSinceMon = (day + 6) % 7;
  var weekStart = new Date(now);
  weekStart.setDate(weekStart.getDate() - daysSinceMon);
  weekStart.setHours(0,0,0,0);
  var qDone = (allRecords||[]).filter(function(r){ return new Date(r.created_at) >= weekStart; }).length;
  var sessPerWeek = (profile && (profile.sessions_per_week || profile.weekly_sessions)) || 5;
  var qWeeklyTarget = qTarget * sessPerWeek;
  return { qDone: qDone, qWeeklyTarget: qWeeklyTarget, sessPerWeek: sessPerWeek };
}

// ===== TIME-TO-IMPROVE =====
function estimatedTimeToImprove(mastery, improvementScore, profile) {
  const sessPerWeek = (profile && profile.study_sessions_per_week) || 3;
  const base = mastery < 30 ? 24 : mastery < 50 ? 16 : mastery < 70 ? 10 : 5;
  const mult = improvementScore > 8 ? 0.75 : improvementScore < -8 ? 1.35 : 1.0;
  const sessNeeded = Math.round(base * mult);
  const weeks = Math.max(1, Math.round(sessNeeded / sessPerWeek));
  return { weeks, sessNeeded, sessPerWeek };
}


// ===== PLAN UPSERT (stable — no reshuffle) =====
async function upsertPlan(user, primaryTopic, newTaskDefs) {
  const title = 'Focus Plan: ' + primaryTopic.sub;
  const { data: existing } = await sb.from('focus_plans')
    .select('id').eq('user_id', user.id).eq('title', title).eq('status', 'ACTIVE')
    .order('generated_date', { ascending: false }).limit(1).maybeSingle();

  if (existing) {
    const { data: exTasks } = await sb.from('focus_tasks')
      .select('*').eq('plan_id', existing.id).order('priority');
    const tasks = exTasks || [];
    const doneCount = tasks.filter(t => t.status === 'DONE').length;
    const pendingCount = tasks.filter(t => t.status !== 'DONE').length;

    if (tasks.length > 0 && pendingCount === 0) {
      // All done — append a fresh wave
      const maxP = Math.max(...tasks.map(t => t.priority || 0));
      await sb.from('focus_tasks').insert(newTaskDefs.map((t, i) => ({
        plan_id: existing.id, topic: primaryTopic.topic, subtopic: primaryTopic.sub,
        task_title: t.title, priority: maxP + i + 1, estimated_minutes: t.minutes, status: 'NOT_STARTED'
      })));
      const { data: updated } = await sb.from('focus_tasks').select('*').eq('plan_id', existing.id).order('priority');
      return updated || tasks;
    }

    if (doneCount >= 1 && pendingCount <= 2) {
      // Near done — append harder tasks (second half of new set)
      const harder = newTaskDefs.slice(Math.floor(newTaskDefs.length / 2));
      const maxP = Math.max(...tasks.map(t => t.priority || 0));
      if (harder.length > 0) {
        await sb.from('focus_tasks').insert(harder.map((t, i) => ({
          plan_id: existing.id, topic: primaryTopic.topic, subtopic: primaryTopic.sub,
          task_title: t.title + ' (Advanced)', priority: maxP + i + 1, estimated_minutes: t.minutes, status: 'NOT_STARTED'
        })));
      }
      const { data: updated } = await sb.from('focus_tasks').select('*').eq('plan_id', existing.id).order('priority');
      return updated || tasks;
    }

    // Stable — return as-is
    return tasks;
  }

  // Focus Practice is free — no credit gate
  const { data: plan } = await sb.from('focus_plans').insert({
    user_id: user.id, title,
    generated_date: new Date().toISOString().split('T')[0],
    biggest_weakness_topic: primaryTopic.topic, status: 'ACTIVE'
  }).select().single();
  if (!plan) return newTaskDefs.map((t, i) => ({ ...t, task_title: t.title, estimated_minutes: t.minutes, id: null, status: 'NOT_STARTED', priority: i + 1 }));
  await sb.from('focus_tasks').insert(newTaskDefs.map((t, i) => ({
    plan_id: plan.id, topic: primaryTopic.topic, subtopic: primaryTopic.sub,
    task_title: t.title, priority: i + 1, estimated_minutes: t.minutes, status: 'NOT_STARTED'
  })));
  const { data: newTasks } = await sb.from('focus_tasks').select('*').eq('plan_id', plan.id).order('priority');
  return newTasks || [];
}

async function cycleTask(taskId, currentStatus, btn, label) {

             : 'NOT_STARTED';
  btn.setAttribute('data-status', next);
  btn.className = 'task-toggle' + (next === 'IN_PROGRESS' ? ' inprogress' : next === 'DONE' ? ' done' : '');
  btn.textContent = next === 'IN_PROGRESS' ? '▶' : next === 'DONE' ? '✓' : '';
  if (label) {
    label.style.textDecoration = next === 'DONE' ? 'line-through' : '';
    label.style.opacity = next === 'DONE' ? '0.5' : '';
  }
  if (taskId) await sb.from('focus_tasks').update({ status: next }).eq('id', taskId);
}

function renderPage(primaryTopic, weaknesses, strengths, recentlyMastered, mastered, tasks, profile, primaryRank, timeToImprove, allRecords) {

      priority: i + 1,

  });
  var groups = groupTasksByDay(merged);
  var currentDay = getCurrentDay(groups);
  var todayTasks = groups[currentDay] || [];

  // coverage map subtopics
  var covSubs = SUBTOPIC_MAP[primaryTopic.topic] || SUBTOPIC_MAP[primaryTopic.sub] || [];

  (allRecords||[]).forEach(function(r){
    var k = (r.subtopic||'').toLowerCase();
    qBySub[k] = (qBySub[k]||0) + 1;
  });

// ===== HELPERS: convert weakness_reports row to computeTopicProfile format =====
function reportToProfile(report, qData) {
  const m = report.mastery_score != null ? Math.round(report.mastery_score)
           : (qData && qData.mastery != null ? qData.mastery : 45);
  let priority, priorityClass;
  if (m < 30)      { priority = 'Critical'; priorityClass = 'critical'; }
  else if (m < 50) { priority = 'High';     priorityClass = 'high';     }
  else if (m < 70) { priority = 'Medium';   priorityClass = 'med';      }
  else             { priority = 'Low';       priorityClass = 'low';      }
  let trend = 'Stable', trendIcon = '➖';
  const imp = report.improvement_score;
  if (imp != null && imp > 5)  { trend = 'Improving'; trendIcon = '📈'; }
  if (imp != null && imp < -5) { trend = 'Declining'; trendIcon = '📉'; }
  const whyBullets = [];
  if (report.total_signals) whyBullets.push(`${report.total_signals} weakness signal${report.total_signals > 1 ? 's' : ''} detected`);
  if (trend === 'Improving') whyBullets.push('Showing improvement recently — keep going');
  else if (trend === 'Declining') whyBullets.push('Weakness signals increasing — needs attention');
  if (report.biggest_weakness) whyBullets.push('Ranked as your #1 biggest weakness');
  if (qData) whyBullets.push(...(qData.whyBullets || []));
  const sub = report.subtopic || report.topic;
  return {
    topic: report.topic, sub,
    mastery: m, priority, priorityClass, trend, trendIcon,
    whyBullets, strengthBullets: qData ? (qData.strengthBullets || []) : [],
    total: report.total_signals || (qData ? qData.total : 0) || 0,
    last7: qData ? qData.last7 : 0, last14: qData ? qData.last14 : 0,
    avgConf: qData ? qData.avgConf : null,
    confAfterArr: qData ? (qData.confAfterArr || []) : [],
    examMistakes: qData ? (qData.examMistakes || 0) : 0,
    weakSignals: qData ? (qData.weakSignals || 0) : 0,
    helpReqs: qData ? (qData.helpReqs || 0) : 0,
    strength: m >= 75, mastered: m >= 90, recentlyMastered: false,
    concepts: qData ? (qData.concepts || []) : [],
    decayScore: qData ? (qData.decayScore || 0) : 0,
    weaknessScore: report.weakness_score, priorityRank: report.priority_rank,
    improvementScore: report.improvement_score != null ? report.improvement_score : null
  };
}

// ===== MAIN DATA LOAD =====
async function deviceGuard(sb, userId) {
  var{data:_ap}=await sb.from('profiles').select('is_admin').eq('id',userId).single();
  if(_ap&&_ap.is_admin)return true;
  function _d2(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(16).padStart(8,'0');}
  var tz=(typeof Intl!=='undefined')?(Intl.DateTimeFormat().resolvedOptions().timeZone||''):'';
  var sw=Math.min(screen.width,screen.height), sh=Math.max(screen.width,screen.height);
  var fp=_d2([navigator.userAgent,sw+'x'+sh+'x'+screen.colorDepth,navigator.language||'',tz].join('|'));
  var{data:d}=await sb.from('user_devices').select('id').eq('user_id',userId).eq('device_fingerprint',fp).eq('is_active',true).maybeSingle();
  if(d) return true;
  var migs=[
    _d2([navigator.userAgent,screen.width+'x'+screen.height+'x'+screen.colorDepth,navigator.language||'',tz].join('|')),
    _d2([navigator.userAgent,screen.height+'x'+screen.width+'x'+screen.colorDepth,navigator.language||'',tz].join('|')),
    _d2([navigator.userAgent,navigator.platform||'',screen.width+'x'+screen.height+'x'+screen.colorDepth,navigator.language||'',tz].join('|'))
  ];
  for(var _i=0;_i<migs.length;_i++){
    var{data:m}=await sb.from('user_devices').select('id').eq('user_id',userId).eq('device_fingerprint',migs[_i]).eq('is_active',true).maybeSingle();
    if(m){var now=new Date().toISOString();await sb.from('user_devices').update({device_fingerprint:fp,last_seen:now,last_active:now}).eq('id',m.id);return true;}
  }
  window.location.href='devices.html?blocked=1';return false;
}

  const params     = new URLSearchParams(window.location.search);
  const urlTopic   = params.get('topic') || '';

  const [profRes, sessRes, mastRes, examRes, repRes] = await Promise.all([

    sb.from('mastery_records').select('topic, subtopic, mastery_score, questions_seen, last_updated').eq('user_id', user.id),
    sb.from('exam_mistakes').select('topic, subtopic').eq('user_id', user.id),

    document.querySelector('.sidebar').appendChild(adminLink);
  }
  const sessions   = sessRes.data  || [];
  const mastRecs   = mastRes.data  || [];
  const examMist   = examRes.data  || [];
  const wReports   = repRes.data   || [];
  const sessionIds = sessions.map(s => s.id);

  let records = [];
  if (sessionIds.length > 0) {
    const { data: qData } = await sb.from('question_records')
      .select('topic, subtopic, concepts, created_at, weakness_signal, help_request, explanation_request, repeated_question, confidence_after')

    records = qData || [];

  const academic = records.filter(r => isAcademicTopic(r.topic) && isAcademicTopic(r.subtopic));

  const mastMap = {};

    };

    const k = e.topic.trim() + '::' + e.subtopic.trim();
    examMap[k] = (examMap[k] || 0) + 1;
  });

  const map = {};
  academic.forEach(r => {
    const key = r.topic.trim() + '::' + r.subtopic.trim();
    if (!map[key]) map[key] = {
      topic: r.topic.trim(), sub: r.subtopic.trim(),
      records: [], concepts: new Set(),
      weakSignals: 0, helpRequests: 0, explRequests: 0, repeated: 0, confAfterArr: []
    };
    map[key].records.push(r.created_at);
    if (Array.isArray(r.concepts)) r.concepts.forEach(c => map[key].concepts.add(c));
    if (r.weakness_signal)      map[key].weakSignals++;
    if (r.help_request)         map[key].helpRequests++;
    if (r.explanation_request)  map[key].explRequests++;
    if (r.repeated_question)    map[key].repeated++;
    if (r.confidence_after != null) map[key].confAfterArr.push(r.confidence_after);
  });

  mastRecs.filter(m => isAcademicTopic(m.topic) && isAcademicTopic(m.subtopic) && (m.questions_seen || 0) >= 2).forEach(m => {
    const key = m.topic.trim() + '::' + m.subtopic.trim();
    if (!map[key]) {
      const fakeTs = [];
      for (let i = 0; i < Math.min(m.questions_seen || 2, 10); i++) fakeTs.push(m.last_updated);
      map[key] = { topic: m.topic.trim(), sub: m.subtopic.trim(), records: fakeTs, concepts: new Set(), weakSignals: 0, helpRequests: 0, explRequests: 0, repeated: 0, confAfterArr: [] };
    }
  });

  const all = Object.entries(map).map(([key, entry]) => {
    const mData = mastMap[key] || {};
    return computeTopicProfile({
      ...entry,
      masteryScore: mData.masteryScore !== undefined ? mData.masteryScore : null,
      examMistakes: examMap[key] || 0
    });
  }).filter(Boolean);

  // Build a lookup of question_records profiles by topic::subtopic key (lowercase)
  const qProfileMap = {};
  all.forEach(p => {
    qProfileMap[(p.topic||'').toLowerCase()+'::'+p.sub.toLowerCase()] = p;
  });

  // ── Consume weakness_reports as the authoritative ranked list ──
  // Build a rank map from weakness_reports for re-sorting
  const reportRankMap = {};
  wReports.forEach(r => {
    const k = (r.topic||'').toLowerCase() + '::' + (r.subtopic||r.topic||'').toLowerCase();
    reportRankMap[k] = r;
  });

  let weaknesses, strengths, recentlyMastered, mastered;

  if (wReports.length > 0) {
    // Convert weakness_reports to profiles, merging question_records data for richer bullets
    const reportProfiles = wReports.map(r => {
      const k = (r.topic||'').toLowerCase() + '::' + (r.subtopic||r.topic||'').toLowerCase();
      const qp = qProfileMap[k] || null;
      return reportToProfile(r, qp);
    });

    weaknesses       = reportProfiles.filter(w => !w.mastered && !w.strength);
    strengths        = reportProfiles.filter(w => w.strength);
    recentlyMastered = [];
    mastered         = reportProfiles.filter(w => w.mastered);

    // Also include any strengths/mastered from question_records not in reports
    all.filter(p => p.strength || p.mastered).forEach(p => {
      const k = p.topic.toLowerCase()+'::'+p.sub.toLowerCase();
      if (!reportRankMap[k]) {
        if (p.mastered) mastered.push(p);
        else if (p.strength) strengths.push(p);
      }
    });
  } else {
    // Fallback: build entirely from question_records (existing behavior)
    all.sort((a, b) => b.decayScore - a.decayScore);
    weaknesses       = all.filter(w => !w.strength && !w.recentlyMastered && !w.mastered);
    strengths        = all.filter(w => w.strength);
    recentlyMastered = all.filter(w => w.recentlyMastered);
    mastered         = all.filter(w => w.mastered);
  }

  if (weaknesses.length === 0 && wReports.length === 0) { renderEmpty(); return; }
  if (weaknesses.length === 0 && wReports.length > 0) {
    // All topics are strengths/mastered — show best weakness or first report
    const top = wReports[0];
    const k = (top.topic||'').toLowerCase()+'::'+(top.subtopic||top.topic||'').toLowerCase();
    weaknesses = [reportToProfile(top, qProfileMap[k] || null)];
  }

  let primaryTopic = weaknesses[0];
  if (urlTopic || urlSub) {
    // Try to match in weaknesses list first
    const match = weaknesses.find(w =>
      w.topic.toLowerCase() === urlTopic.toLowerCase() ||
      w.sub.toLowerCase() === (urlSub || urlTopic).toLowerCase()
    );
    if (match) {
      primaryTopic = match;
    } else {
      // Try weakness_reports directly
      const rMatch = wReports.find(r =>
        (r.topic||'').toLowerCase() === urlTopic.toLowerCase() ||
        (r.subtopic||'').toLowerCase() === (urlSub||urlTopic).toLowerCase()
      );
      if (rMatch) {
        const k = rMatch.topic.toLowerCase()+'::'+(rMatch.subtopic||rMatch.topic).toLowerCase();
        primaryTopic = reportToProfile(rMatch, qProfileMap[k] || null);
      } else if (urlSub) {
        // Manual selection not in DB — build synthetic profile
        const fakeM = urlMastery !== null ? urlMastery : 45;
        let priority, priorityClass;
        if (fakeM < 30)      { priority = 'Critical'; priorityClass = 'critical'; }
        else if (fakeM < 50) { priority = 'High';     priorityClass = 'high';     }
        else if (fakeM < 70) { priority = 'Medium';   priorityClass = 'med';      }
        else                  { priority = 'Low';       priorityClass = 'low';      }
        primaryTopic = {
          topic: urlTopic, sub: urlSub, mastery: fakeM,
          priority, priorityClass, trend: 'Stable', trendIcon: '➖',
          whyBullets: ['Selected from Weakness Analyzer'],
          strengthBullets: [], total: 0, last7: 0, last14: 0,
          avgConf: null, examMistakes: 0, weakSignals: 0,
          strength: false, mastered: false, recentlyMastered: false,
          concepts: [], decayScore: 0
        };
      }
    }
  }

  // Compute days until exam
  let daysUntilExam = null;
  if (profile && profile.exam_date) {
    const examMs = new Date(profile.exam_date).getTime() - Date.now();
    if (!isNaN(examMs)) daysUntilExam = Math.max(0, Math.round(examMs / 86400000));
  }

  const impScore = primaryTopic.improvementScore != null ? primaryTopic.improvementScore : null;
  const examTypeForPlan = (profile && profile.exam_type) || 'SAT';
  const qTargetForPlan = computeQTarget(primaryTopic.mastery, primaryTopic.topic, examTypeForPlan);
  const taskDefs = generateAllDayTasks(primaryTopic.sub, primaryTopic.topic, primaryTopic.mastery, qTargetForPlan);
  const timeToImprove = estimatedTimeToImprove(primaryTopic.mastery, impScore, profile);

  let tasksToRender = taskDefs.map((t, i) => ({ ...t, task_title: t.title, estimated_minutes: t.minutes, id: null, status: 'NOT_STARTED', priority: i + 1 }));

  try {
    tasksToRender = await upsertPlan(user, primaryTopic, taskDefs);
    if (!tasksToRender || tasksToRender.length === 0) {
      tasksToRender = taskDefs.map((t, i) => ({ ...t, task_title: t.title, estimated_minutes: t.minutes, id: null, status: 'NOT_STARTED', priority: i + 1 }));
    }
  } catch (e) {
    if (e.message && e.message.startsWith('focus_plan_credit_blocked')) return;
    console.warn('focus_plans/focus_tasks not available:', e.message);
  }

  const primaryRank = primaryTopic.priorityRank
    || (weaknesses.indexOf(primaryTopic) + 1)
    || 1;
  renderPage(primaryTopic, weaknesses, strengths, recentlyMastered, mastered, tasksToRender, profile, primaryRank, timeToImprove, academic);
}

function showFocusPaywall(reason) {
  var existing = document.getElementById('focusPaywall');
  if (existing) existing.remove();
  var msg = reason === 'daily_limit_reached'
    ? 'Daily limit reached. Resets at midnight UTC. <a href="pricing.html" style="color:var(--cyan,#22d3ee);text-decoration:underline;font-weight:600">Upgrade to Pro →</a>'
    : reason === 'insufficient_credits'
    ? 'Not enough credits (10 needed to generate a plan). <a href="pricing.html" style="color:var(--cyan,#22d3ee);text-decoration:underline;font-weight:600">Buy more credits →</a>'
    : 'Could not verify your credits. Please refresh and try again.';
  var el = document.createElement('div');
  el.id = 'focusPaywall';
  el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;background:#1a1a2e;border:1px solid rgba(239,68,68,.4);border-radius:12px;padding:14px 20px;color:#f87171;font-size:13px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)';
  el.innerHTML = msg + ' <button onclick="this.parentNode.remove()" style="margin-left:12px;background:none;border:none;color:#9ca3af;cursor:pointer;font-size:16px;line-height:1">×</button>';
  document.body.appendChild(el);
}

loadData().catch(err => {
  console.error('Focus page error:', err);
  const el = document.getElementById('pageContent');
  if (el) el.innerHTML = `
    <div class="empty-state" style="text-align:center;padding:60px 20px;color:var(--text-400)">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <h2 style="color:var(--text-100);margin-bottom:8px">Something went wrong</h2>
      <p style="margin-bottom:24px">${err.message || 'Unknown error'}</p>
      <a href="chat.html" style="display:inline-block;background:var(--cyan-3);color:#000;padding:10px 24px;border-radius:8px;font-weight:600;text-decoration:none">Go to Chat →</a>
    </div>`;
});
