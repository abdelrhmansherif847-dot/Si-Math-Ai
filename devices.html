<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Device Management – Si Math AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#050a14;--bg-elev-1:#0a1224;--bg-elev-2:#0e1830;--bg-card:#0c1428;--bg-card-hi:#101a32;
  --cyan:#38bdf8;--cyan-2:#0ea5e9;--cyan-3:#7dd3fc;
  --cyan-bg-soft:rgba(56,189,248,.1);--cyan-bg-med:rgba(56,189,248,.16);
  --cyan-border:rgba(56,189,248,.28);--cyan-border-soft:rgba(56,189,248,.14);
  --green:#22c55e;--green-soft:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.32);
  --amber:#f5b942;--amber-soft:rgba(245,185,66,.12);--amber-border:rgba(245,185,66,.32);
  --red:#ef4f5f;--red-soft:rgba(239,79,95,.12);--red-border:rgba(239,79,95,.32);
  --purple:#a855f7;--purple-soft:rgba(168,85,247,.12);--purple-border:rgba(168,85,247,.32);
  --gold:#f59e0b;--gold-soft:rgba(245,158,11,.12);--gold-border:rgba(245,158,11,.32);
  --text-100:#fff;--text-200:#dde8f7;--text-300:#a8bcd9;--text-400:#7a90b2;--text-500:#536b8c;
  --border-soft:#1a2540;--border-mid:#26334d;
  --space-4:16px;--space-5:20px;--space-6:24px;--space-7:32px;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:24px;
  --font-display:'Manrope',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --nav-h:58px;--side-w:262px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden;background:#050a14}
body{background:#050a14;color:var(--text-200);font-family:var(--font-body);font-size:15px;line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb-1{width:420px;height:420px;background:radial-gradient(circle,rgba(56,189,248,.11),transparent 70%);top:-140px;right:-120px}
.orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(14,165,233,.07),transparent 70%);bottom:-80px;left:-100px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

.topbar{position:fixed;top:0;left:0;right:0;z-index:60;height:calc(var(--nav-h) + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;gap:12px;padding-left:16px;padding-right:16px;background:rgba(5,10,20,.97);border-bottom:1px solid var(--border-soft)}
.hamb{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;color:var(--text-200)}
.hamb svg{width:18px;height:18px}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:17px;color:#fff}
.logo-mark{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--cyan-border);box-shadow:0 0 16px rgba(56,189,248,.22);overflow:hidden}
.logo-mark img{width:96%;height:96%;object-fit:contain;display:block}
.brand .mid{color:var(--cyan)}.brand .ai{color:var(--text-300);font-weight:700}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-avatar{width:34px;height:34px;border-radius:50%;background:var(--cyan-bg-soft);border:1px solid var(--cyan-border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--cyan);cursor:pointer}

.sidebar{position:fixed;z-index:70;top:0;bottom:0;left:0;width:var(--side-w);background:var(--bg-elev-1);border-right:1px solid var(--border-soft);padding:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 14px) 14px 18px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;transform:translateX(-100%);transition:transform .32s cubic-bezier(.5,.1,.25,1)}
.sidebar.open{transform:translateX(0)}
.side-sec{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-500);margin:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:var(--text-300);font-weight:500;font-size:14.5px;position:relative;border:1px solid transparent;transition:all .2s}
.nav-item svg{width:18px;height:18px;flex-shrink:0;color:var(--text-400);transition:color .2s}
.nav-item:hover{background:var(--bg-card);color:var(--text-100)}
.nav-item:hover svg{color:var(--cyan)}
.nav-item.active{background:var(--cyan-bg-soft);color:#fff;border-color:var(--cyan-border-soft)}
.nav-item.active svg{color:var(--cyan)}
.nav-item.active::before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 4px 4px 0;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.overlay{position:fixed;inset:0;z-index:65;background:rgba(2,6,14,.66);opacity:0;visibility:hidden;transition:opacity .3s}
.overlay.show{opacity:1;visibility:visible}

.main{position:relative;z-index:10;padding:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 20px) 16px calc(40px + env(safe-area-inset-bottom,0px));max-width:1200px;margin:0 auto}

.card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:20px;animation:rise .5s ease both}
.sec-label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-500);margin:24px 4px 12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border-soft)}

/* Plan bar */
.limit-display{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.limit-text{font-size:13px;color:var(--text-300)}
.limit-count{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--text-100)}
.plan-bar{background:var(--bg-elev-1);border-radius:100px;height:7px;overflow:hidden;margin-bottom:8px}
.plan-fill{height:100%;border-radius:100px;transition:width .5s ease}
.plan-note{font-family:var(--font-mono);font-size:10.5px;color:var(--text-500)}

/* Upgrade CTA */
.upgrade-cta{background:linear-gradient(135deg,rgba(56,189,248,.1),var(--bg-card));border:1px solid var(--cyan-border);border-radius:var(--r-lg);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;animation:rise .5s .05s ease both;flex-wrap:wrap}
.upgrade-cta .uc-text{flex:1}
.upgrade-cta .uc-title{font-family:var(--font-display);font-weight:700;font-size:15px;color:#fff;margin-bottom:4px}
.upgrade-cta .uc-sub{font-size:13px;color:var(--text-400)}
.btn-cyan{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--cyan-2),var(--cyan));color:#031020;padding:10px 20px;border-radius:var(--r-sm);font-family:var(--font-display);font-weight:700;font-size:13.5px;border:none;transition:all .2s;text-decoration:none;white-space:nowrap}
.btn-cyan:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(56,189,248,.35)}

/* Device cards */
.device-list{display:flex;flex-direction:column;gap:10px}
.device-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:16px 20px;display:flex;align-items:center;gap:16px;transition:all .2s;flex-wrap:wrap}
.device-card:hover{border-color:var(--cyan-border-soft)}
.device-card.current-device{border-color:var(--cyan-border);background:var(--cyan-bg-soft)}
.device-card.suspicious{border-color:var(--red-border)}
.device-icon{font-size:1.8rem;flex-shrink:0}
.device-info{flex:1;min-width:0}
.device-name{font-family:var(--font-display);font-weight:700;font-size:14px;color:#fff;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.device-meta{font-family:var(--font-mono);font-size:10.5px;color:var(--text-400);display:flex;gap:14px;flex-wrap:wrap}
.d-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;font-family:var(--font-mono);font-size:10px;font-weight:600}
.d-badge-current{background:var(--green-soft);border:1px solid var(--green-border);color:var(--green)}
.d-badge-free{background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft);color:var(--cyan)}
.d-badge-pro{background:var(--gold-soft);border:1px solid var(--gold-border);color:var(--gold)}

/* Buttons */
.btn-remove{padding:8px 14px;border-radius:var(--r-sm);background:var(--red-soft);border:1px solid var(--red-border);color:var(--red);font-size:12.5px;font-weight:600;transition:all .2s}
.btn-remove:hover{background:rgba(239,79,95,.2);transform:translateY(-1px)}
.btn-disabled{padding:8px 14px;border-radius:var(--r-sm);background:var(--bg-elev-1);border:1px solid var(--border-soft);color:var(--text-500);font-size:12.5px;cursor:not-allowed}

/* Session rows */
.sessions-list{display:flex;flex-direction:column;gap:8px}
.session-row{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:13px 18px;display:flex;align-items:center;gap:14px;transition:all .2s;flex-wrap:wrap}
.session-row:hover{border-color:var(--cyan-border-soft)}
.session-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.session-dot.active{background:var(--green);box-shadow:0 0 8px var(--green)}
.session-dot.inactive{background:var(--text-500)}
.session-info{flex:1;min-width:0}
.session-name{font-size:13.5px;font-weight:600;color:var(--text-200)}
.session-meta{font-family:var(--font-mono);font-size:10.5px;color:var(--text-500);margin-top:2px}

/* Alerts */
.alert-box{padding:13px 16px;border-radius:var(--r-md);font-size:13px;display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;animation:rise .4s ease both}
.alert-warn{background:var(--amber-soft);border:1px solid var(--amber-border);color:var(--amber)}
.alert-danger{background:var(--red-soft);border:1px solid var(--red-border);color:var(--red)}
.alert-info{background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft);color:var(--cyan-3)}

/* Security info */
.sec-info-grid{display:flex;flex-direction:column;gap:14px}
.sec-info-row{display:flex;gap:14px;align-items:flex-start}
.sec-info-ico{font-size:1.4rem;flex-shrink:0;margin-top:1px}
.sec-info-title{font-family:var(--font-display);font-weight:700;font-size:13.5px;color:#fff;margin-bottom:3px}
.sec-info-desc{font-size:12.5px;color:var(--text-400);line-height:1.5}

.empty-card{text-align:center;padding:32px;color:var(--text-400);font-family:var(--font-mono);font-size:12px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--cyan-border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-400)}

@media(min-width:1024px){
  .hamb{display:none}.sidebar{transform:translateX(0)}.overlay{display:none!important}
  .main{padding-left:calc(var(--side-w) + 28px);padding-right:28px;max-width:1360px}
  .topbar{padding-left:calc(var(--side-w) + 28px)}.brand.in-topbar{display:none}
}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
const SUPABASE_URL = 'https://igvkyxkmjnkzscqgommj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MTRD_njnCX-1CobeqTIMiw_QhNYarXp';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Sidebar toggle
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('hamb').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('show'); });
overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
sidebar.querySelectorAll('.nav-item').forEach(a => a.addEventListener('click', () => { if (window.innerWidth < 1024) { sidebar.classList.remove('open'); overlay.classList.remove('show'); } }));

function getPlanLimit(planCode) { return planCode === 'FREE' ? 2 : 3; }

function getDeviceFingerprint() {
  // Must be identical to deviceGuard() on all protected pages
  function _d2(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(16).padStart(8,'0');}
  var tz=(typeof Intl!=='undefined')?(Intl.DateTimeFormat().resolvedOptions().timeZone||''):'';
  var sw=Math.min(screen.width,screen.height), sh=Math.max(screen.width,screen.height);
  return _d2([navigator.userAgent,sw+'x'+sh+'x'+screen.colorDepth,navigator.language||'',tz].join('|'));
}

function getDeviceInfo() {
  const ua = navigator.userAgent;
  let browser = 'Unknown Browser';
  if (/Edg\//.test(ua)) browser = 'Edge';
  else if (/Chrome\//.test(ua) && !/Chromium/.test(ua)) browser = 'Chrome';
  else if (/Firefox\//.test(ua)) browser = 'Firefox';
  else if (/Safari\//.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  else if (/Opera|OPR\//.test(ua)) browser = 'Opera';

  let os = 'Unknown OS';
  if (/Windows NT/.test(ua)) os = 'Windows';
  else if (/Mac OS X/.test(ua) && !/iPhone|iPad/.test(ua)) os = 'macOS';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/iPhone|iPad/.test(ua)) os = 'iOS';
  else if (/Linux/.test(ua)) os = 'Linux';

  let icon = '💻';
  if (/Android|iPhone|iPad/.test(ua)) icon = '📱';
  else if (/Mac OS X/.test(ua) && !/iPhone|iPad/.test(ua)) icon = '🍎';

  const deviceName = `${browser} on ${os}`;
  return { browser, os_name: os, deviceName, icon };
}

function relTime(ts) {
  if (!ts) return 'never';
  const d = new Date(ts), now = Date.now(), diff = now - d.getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  if (diff < 604800000) return `${Math.floor(diff/86400000)}d ago`;
  return d.toLocaleDateString();
}

function showAlert(type, msg) {
  const div = document.createElement('div');
  div.className = `alert-box alert-${type}`;
  div.innerHTML = `<span>${type === 'danger' ? '⚠️' : type === 'warn' ? '⚡' : 'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('alerts').appendChild(div);
}

async function registerCurrentDevice(userId, isAdmin) {
  const fp = getDeviceFingerprint();
  const info = getDeviceInfo();
  const now = new Date().toISOString();

  const existing = await sb.from('user_devices')
    .select('id')
    .eq('user_id', userId)
    .eq('device_fingerprint', fp)
    .maybeSingle();

  if (!existing.data) {
    // Admins bypass device limit — always register
    const allowed = isAdmin ? true : (await sb.rpc('can_register_device', {
      p_user_id: userId,
      p_fingerprint: fp
    })).data;

    if (!allowed) {
      showAlert('warn', 'Device limit reached for your plan. Remove an existing device to register this one, or upgrade to Pro.');
      return fp;
    }

    await sb.from('user_devices').insert({
      user_id: userId,
      device_fingerprint: fp,
      device_name: info.deviceName,
      browser: info.browser,
      os_name: info.os_name,
      is_active: true,
      last_seen: now,
      last_active: now
    });
  } else {
    // Existing device — always allowed to update last seen
    await sb.from('user_devices')
      .update({ last_seen: now, last_active: now, is_active: true })
      .eq('id', existing.data.id);
  }
  return fp;
}

async function removeDevice(deviceId, userId) {
  const { error } = await sb.from('user_devices').delete().eq('id', deviceId).eq('user_id', userId);
  if (error) { showAlert('danger', 'Failed to remove device. Please try again.'); return; }
  loadPage();
}

async function loadPage() {
  const { data: { user }, error: authErr } = await sb.auth.getUser();
  if (authErr || !user) { window.location.href = 'login.html'; return; }

  const initials = (user.email || '?')[0].toUpperCase();
  document.getElementById('topAvatar').textContent = initials;

  const { data: profile } = await sb.from('profiles').select('plan_code, is_admin').eq('id', user.id).single();
  const planCode = (profile && profile.plan_code) || 'FREE';
  const isAdmin = !!(profile && profile.is_admin);
  const limit = getPlanLimit(planCode);

  if (isAdmin) { const an = document.getElementById('adminNavSection'); if (an) an.style.display = 'block'; }

  document.getElementById('planBadgeTop').innerHTML = planCode !== 'FREE'
    ? `<span style="background:var(--gold-soft);border:1px solid var(--gold-border);color:var(--gold);padding:3px 10px;border-radius:100px">⭐ Pro</span>`
    : `<span style="background:var(--cyan-bg-soft);border:1px solid var(--cyan-border-soft);color:var(--cyan);padding:3px 10px;border-radius:100px">Free</span>`;

  const currentFp = await registerCurrentDevice(user.id, isAdmin);

  const { data: devices } = await sb.from('user_devices').select('*').eq('user_id', user.id).eq('is_active', true).order('last_seen', { ascending: false });
  const deviceList = devices || [];

  document.getElementById('alerts').innerHTML = '';

  if (new URLSearchParams(window.location.search).get('blocked') === '1') {
    showAlert('warn', 'This device is not registered for your account. Please remove an existing device below to free up a slot.');
  } else if (deviceList.length > limit) {
    showAlert('danger', `You have ${deviceList.length} active devices but your plan allows ${limit}. Please remove old devices to stay within your limit.`);
  }

  const html = buildHTML(deviceList, planCode, limit, currentFp, user);
  document.getElementById('pageContent').innerHTML = html;

  document.querySelectorAll('.btn-remove-device').forEach(btn => {
    btn.addEventListener('click', () => removeDevice(btn.dataset.id, user.id));
  });
}

function buildHTML(devices, planCode, limit, currentFp, user) {
  const used = devices.length;
  const pct = Math.min(100, (used / limit) * 100);
  const fillColor = pct >= 100 ? 'var(--red)' : pct >= 75 ? 'var(--amber)' : 'var(--cyan)';

  let html = `
  <div class="sec-label" style="margin-top:0">Device Usage</div>
  <div class="card">
    <div class="limit-display">
      <span class="limit-text">${planCode !== 'FREE' ? '⭐ Pro Plan' : '🆓 Free Plan'} — ${limit} device${limit>1?'s':''} allowed</span>
      <span class="limit-count" style="color:${fillColor}">${used} / ${limit}</span>
    </div>
    <div class="plan-bar"><div class="plan-fill" style="width:${pct}%;background:${fillColor};box-shadow:0 0 8px ${fillColor}66"></div></div>
    <p class="plan-note">Each browser profile on a different physical device counts as one device.</p>
  </div>`;

  if (planCode === 'FREE') {
    html += `
  <div class="upgrade-cta" style="margin-top:14px">
    <div class="uc-text">
      <div class="uc-title">⭐ Upgrade to Pro — 3 Devices</div>
      <div class="uc-sub">Access Si Math AI on your laptop, tablet, and phone simultaneously.</div>
    </div>
    <a href="pricing.html" class="btn-cyan">View Plans</a>
  </div>`;
  }

  html += `
  <div class="sec-label">Active Devices (${used})</div>
  <div class="device-list">`;

  if (devices.length === 0) {
    html += `<div class="empty-card">No active devices found.</div>`;
  } else {
    devices.forEach(d => {
      const isCurrent = d.device_fingerprint === currentFp;
      const osIcon = /Android|iOS/.test(d.os_name || '') ? '📱' : /macOS/.test(d.os_name || '') ? '🍎' : '💻';
      html += `
      <div class="device-card${isCurrent ? ' current-device' : ''}">
        <div class="device-icon">${osIcon}</div>
        <div class="device-info">
          <div class="device-name">
            ${escHtml(d.device_name || 'Unknown Device')}
            ${isCurrent ? '<span class="d-badge d-badge-current">This Device</span>' : ''}
          </div>
          <div class="device-meta">
            <span>🌐 ${escHtml(d.browser || '?')}</span>
            <span>💻 ${escHtml(d.os_name || '?')}</span>
            <span>🕐 ${relTime(d.last_seen)}</span>
            ${d.ip_address ? `<span>📍 ${escHtml(d.ip_address)}</span>` : ''}
          </div>
        </div>
        ${!isCurrent
          ? `<button class="btn-remove btn-remove-device" data-id="${d.id}">Remove</button>`
          : `<button class="btn-disabled" disabled>Current</button>`}
      </div>`;
    });
  }
  html += `</div>`;

  html += `
  <div class="sec-label">Security Information</div>
  <div class="card">
    <div class="sec-info-grid">
      <div class="sec-info-row">
        <div class="sec-info-ico">🔐</div>
        <div>
          <div class="sec-info-title">Device Fingerprinting</div>
          <div class="sec-info-desc">We identify devices using browser, OS, and screen signature. No personal hardware data is stored.</div>
        </div>
      </div>
      <div class="sec-info-row">
        <div class="sec-info-ico">⚠️</div>
        <div>
          <div class="sec-info-title">Account Sharing Detection</div>
          <div class="sec-info-desc">Simultaneous logins from more devices than your plan allows will be flagged. Excess devices will need to be removed.</div>
        </div>
      </div>
      <div class="sec-info-row">
        <div class="sec-info-ico">📧</div>
        <div>
          <div class="sec-info-title">Suspicious Activity</div>
          <div class="sec-info-desc">If you notice a device you don't recognize, remove it immediately and change your password. Contact support if needed.</div>
        </div>
      </div>
    </div>
  </div>`;

  return html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadPage();
</script>
<script src="nav.js" defer></script>
</body>
</html>
